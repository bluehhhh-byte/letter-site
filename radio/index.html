<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>같은 주파수 — 그리움이 닿는 곳</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { justify-content:flex-start; padding-top:5rem; overflow:hidden; }
    .rd-header {
      position:fixed; top:0; left:0; right:0; z-index:50;
      padding:.85rem 2rem;
      background:rgba(7,7,13,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .rd-header .back-link { color:var(--text-dim); text-decoration:none; font-family:var(--font-sans); font-size:.8rem; letter-spacing:.1em; transition:color .3s; }
    @media (hover:hover) { .rd-header .back-link:hover { color:var(--gold); } }
    .rd-header h1 { font-family:var(--font-serif); font-size:1rem; font-weight:300; color:var(--gold); letter-spacing:.15em; }

    .rd-body {
      position:relative; z-index:1; width:100%; max-width:420px;
      padding:2rem 1.5rem 10rem; display:flex; flex-direction:column;
      align-items:center; gap:1.5rem;
    }

    /* Turntable */
    .rd-turntable {
      position:relative; width:260px; height:260px; flex-shrink:0;
    }
    .rd-platter {
      position:absolute; inset:15px; border-radius:50%;
      background:radial-gradient(circle at 40% 40%, #1a1a24, #0d0d14);
      border:2px solid rgba(201,169,110,0.15);
      box-shadow:inset 0 0 30px rgba(0,0,0,0.5), 0 0 20px rgba(201,169,110,0.05);
    }
    .rd-record {
      position:absolute; inset:15px; border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #2a2a35, #0d0d14 70%);
      border:1px solid rgba(201,169,110,0.08);
      display:flex; align-items:center; justify-content:center;
      transition:transform .8s cubic-bezier(.16,1,.3,1);
    }
    .rd-record.spinning { animation:spinRecord 2s linear infinite; }
    @keyframes spinRecord { to { transform:rotate(360deg); } }
    .rd-record-inner {
      width:50px; height:50px; border-radius:50%;
      background:radial-gradient(circle, rgba(201,169,110,0.08), transparent);
      border:1px solid rgba(201,169,110,0.12);
      display:flex; align-items:center; justify-content:center;
    }
    .rd-record-inner span { font-size:.6rem; color:rgba(201,169,110,0.2); letter-spacing:.2em; }
    .rd-record-groove {
      position:absolute; inset:20%; border-radius:50%;
      border:1px solid rgba(201,169,110,0.04);
    }
    .rd-record-groove:nth-child(2) { inset:33%; }
    .rd-record-groove:nth-child(3) { inset:46%; }

    .rd-tonearm {
      position:absolute; top:-5px; right:-5px; width:80px; height:140px;
      transform-origin:top right; transform:rotate(-30deg);
      transition:transform .6s cubic-bezier(.34,1.56,.64,1);
      z-index:2;
    }
    .rd-tonearm.playing { transform:rotate(0deg); }
    .rd-tonearm-base {
      position:absolute; top:0; right:0; width:14px; height:14px;
      border-radius:50%; background:var(--gold-dim);
      box-shadow:0 0 8px rgba(201,169,110,0.2);
    }
    .rd-tonearm-arm {
      position:absolute; top:6px; right:6px; width:2px; height:80px;
      background:linear-gradient(to bottom, var(--gold-dim), rgba(201,169,110,0.2));
      transform-origin:top; transform:rotate(20deg);
    }
    .rd-tonearm-head {
      position:absolute; bottom:0; right:-2px; width:8px; height:3px;
      background:var(--gold-dim); border-radius:1px;
    }

    /* Equalizer */
    .rd-eq {
      display:flex; gap:3px; height:30px; align-items:flex-end;
      width:100%; max-width:180px; justify-content:center;
    }
    .rd-eq-bar {
      width:3px; background:var(--gold-dim); border-radius:2px;
      height:5px; transition:height .3s ease;
    }
    .rd-eq.active .rd-eq-bar { animation:eqWave .6s ease-in-out infinite alternate; }
    .rd-eq-bar:nth-child(1) { animation-delay:0s; }
    .rd-eq-bar:nth-child(2) { animation-delay:.1s; }
    .rd-eq-bar:nth-child(3) { animation-delay:.2s; }
    .rd-eq-bar:nth-child(4) { animation-delay:.05s; }
    .rd-eq-bar:nth-child(5) { animation-delay:.15s; }
    .rd-eq-bar:nth-child(6) { animation-delay:.25s; }
    .rd-eq-bar:nth-child(7) { animation-delay:.1s; }
    @keyframes eqWave {
      0% { height:5px; }
      100% { height:25px; }
    }

    /* Track Info */
    .rd-info { text-align:center; width:100%; max-width:360px; }
    .rd-track-title {
      font-family:var(--font-serif); font-size:1.05rem;
      font-weight:300; color:var(--gold); margin-bottom:.2rem;
      min-height:1.6em; transition:opacity .5s;
    }
    .rd-track-title.changing { opacity:0; }
    .rd-track-artist {
      font-family:var(--font-sans); font-size:.7rem;
      color:var(--text-dim); letter-spacing:.1em;
      min-height:1.2em;
    }

    /* Comment */
    .rd-comment {
      font-family:var(--font-serif); font-size:.8rem; line-height:1.9;
      color:var(--text); font-weight:300; text-align:center;
      max-width:360px; min-height:3em;
      padding:.8rem; border:1px solid var(--border);
      background:var(--bg-card); position:relative;
      transition:opacity .6s;
    }
    .rd-comment.changing { opacity:0; }

    /* Controls */
    .rd-controls {
      display:flex; align-items:center; gap:1.5rem;
    }
    .rd-btn {
      background:none; border:none; color:var(--text-dim);
      font-size:1.4rem; cursor:pointer; transition:all .3s;
      touch-action:manipulation; padding:.2rem; line-height:1;
      font-family:var(--font-sans);
    }
    .rd-btn:hover { color:var(--gold); }
    .rd-btn:active { transform:scale(.85); }
    .rd-btn-play {
      width:52px; height:52px;
      border:1.5px solid rgba(201,169,110,0.3);
      border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-size:1.2rem;
      background:rgba(201,169,110,0.05);
    }
    .rd-btn-play:hover { border-color:var(--gold); background:rgba(201,169,110,0.1); }
    .rd-btn-play.playing { border-color:var(--gold); }
    .rd-btn-shuffle { font-size:1rem; }

    /* Track list */
    .rd-list-toggle {
      font-family:var(--font-sans); font-size:.55rem; letter-spacing:.15em;
      color:var(--text-muted); background:none; border:none; cursor:pointer;
      transition:color .3s; text-decoration:underline;
      text-underline-offset:3px;
    }
    .rd-list-toggle:hover { color:var(--gold-dim); }

    .rd-tracklist {
      width:100%; max-width:360px; max-height:0; overflow:hidden;
      transition:max-height .5s ease, opacity .5s, margin .5s;
      opacity:0; margin:0;
    }
    .rd-tracklist.open { max-height:400px; opacity:1; margin:.5rem 0 0; overflow-y:auto; }
    .rd-tracklist-item {
      display:flex; align-items:center; gap:.6rem;
      padding:.5rem .6rem; cursor:pointer; border:1px solid transparent;
      transition:all .3s; font-family:var(--font-sans); font-size:.65rem;
      color:var(--text-dim); touch-action:manipulation;
    }
    .rd-tracklist-item:hover { border-color:var(--border); background:var(--bg-card); }
    .rd-tracklist-item.active { color:var(--gold); border-color:rgba(201,169,110,0.15); background:rgba(201,169,110,0.04); }
    .rd-tracklist-num { font-size:.5rem; color:var(--text-muted); min-width:1.5rem; text-align:right; }
    .rd-tracklist-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rd-tracklist-comment { font-size:.5rem; color:var(--text-muted); max-width:140px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Fade animation for track change */
    .rd-turntable .rd-platter { transition:opacity .5s; }
    .rd-turntable.fading .rd-platter { opacity:0.3; }
    .rd-turntable.fading .rd-record { opacity:0.3; }

    /* Responsive */
    @media (max-width:480px) {
      body { padding-top:4rem; }
      .rd-body { padding:1.5rem 1rem 9rem; gap:1.2rem; }
      .rd-turntable { width:200px; height:200px; }
      .rd-record-inner { width:40px; height:40px; }
      .rd-track-title { font-size:.9rem; }
      .rd-comment { font-size:.7rem; padding:.6rem; }
      .rd-btn-play { width:44px; height:44px; font-size:1rem; }
      .rd-btn { font-size:1.2rem; }
    }

    @supports (padding:max(0px)) {
      .rd-body { padding-bottom:max(10rem,env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <header class="rd-header">
    <a href="../index.html" class="back-link">← 돌아가기</a>
    <h1>같은 주파수</h1>
    <span></span>
  </header>

  <div class="stars" id="stars"></div>

  <nav class="mode-nav">
    <a href="../oracle/index.html" class="mode-btn">오라클</a>
    <a href="../tarot/index.html" class="mode-btn">타로</a>
    <a href="../comfort/index.html" class="mode-btn">처방전</a>
    <a href="../postcard/index.html" class="mode-btn">엽서</a>
    <a href="../capsule/index.html" class="mode-btn">캡슐</a>
    <a href="../wish/index.html" class="mode-btn">별자리</a>
    <a href="../book/index.html" class="mode-btn">서재</a>
    <a href="../radio/index.html" class="mode-btn active">라디오</a>
  </nav>

  <div class="rd-body" id="rdBody">
    <!-- Turntable -->
    <div class="rd-turntable" id="rdTurntable">
      <div class="rd-platter"></div>
      <div class="rd-record" id="rdRecord">
        <div class="rd-record-groove"></div>
        <div class="rd-record-groove"></div>
        <div class="rd-record-groove"></div>
        <div class="rd-record-inner"><span>♪</span></div>
      </div>
      <div class="rd-tonearm" id="rdTonearm">
        <div class="rd-tonearm-base"></div>
        <div class="rd-tonearm-arm"></div>
        <div class="rd-tonearm-head"></div>
      </div>
    </div>

    <!-- EQ -->
    <div class="rd-eq" id="rdEq">
      <div class="rd-eq-bar"></div><div class="rd-eq-bar"></div><div class="rd-eq-bar"></div>
      <div class="rd-eq-bar"></div><div class="rd-eq-bar"></div><div class="rd-eq-bar"></div>
      <div class="rd-eq-bar"></div>
    </div>

    <!-- Info -->
    <div class="rd-info">
      <div class="rd-track-title" id="rdTitle">주파수를 맞추는 중...</div>
      <div class="rd-track-artist" id="rdArtist"></div>
    </div>

    <!-- Comment -->
    <div class="rd-comment" id="rdComment"></div>

    <!-- Controls -->
    <div class="rd-controls">
      <button class="rd-btn" id="rdPrev" title="이전 곡">⏮</button>
      <button class="rd-btn rd-btn-play" id="rdPlay" title="재생">▶</button>
      <button class="rd-btn" id="rdNext" title="다음 곡">⏭</button>
      <button class="rd-btn rd-btn-shuffle" id="rdShuffle" title="셔플">🔀</button>
    </div>

    <!-- Track list toggle -->
    <button class="rd-list-toggle" id="rdListToggle">전체 재생목록</button>
    <div class="rd-tracklist" id="rdTracklist"></div>
  </div>

  <div class="footer">같은 밤, 같은 주파수 <span>♥</span></div>

  <div id="player" style="position:absolute;left:-9999px;top:0;width:360px;height:240px;overflow:hidden"></div>

  <script>
    var PLAY_LIST_ID = 'PLuVVPV8so2OUY5YLiBBEXR-nqzQ2HOj4F';
    var COMMENTS = [
      '같은 밤, 같은 음악 속에 우리가 있다',
      '멀리 있어도 이 멜로디는 닿을 거야',
      '지친 하루의 끝, 이 노래가 위로가 되길',
      '네가 없는 자리도 음악으로 채울게',
      '별빛보다 선명한 네 목소리가 그리운 밤',
      '잠들기 전, 너를 생각하며 듣는 곡',
      '이 노래를 들으면 네가 떠올라',
      '시간이 지나도 이 음악은 기억될 거야',
      '혼자인 것 같아도 같은 하늘 아래 있잖아',
      '조용히 너에게 보내는 저녁 인사'
    ];

    var player = null;
    var isPlaying = false;
    var isShuffle = false;
    var commentIdx = Math.floor(Math.random() * COMMENTS.length);

    var titleEl = document.getElementById('rdTitle');
    var artistEl = document.getElementById('rdArtist');
    var commentEl = document.getElementById('rdComment');
    var recordEl = document.getElementById('rdRecord');
    var tonearmEl = document.getElementById('rdTonearm');
    var playBtn = document.getElementById('rdPlay');
    var prevBtn = document.getElementById('rdPrev');
    var nextBtn = document.getElementById('rdNext');
    var shuffleBtn = document.getElementById('rdShuffle');
    var eqEl = document.getElementById('rdEq');
    var turntableEl = document.getElementById('rdTurntable');
    var listToggle = document.getElementById('rdListToggle');
    var tracklistEl = document.getElementById('rdTracklist');

    function updateTrackInfo(data) {
      var title = data ? data.title : '';
      var author = data ? data.author : '';
      titleEl.textContent = title || '주파수를 맞추는 중...';
      titleEl.classList.remove('changing');
      artistEl.textContent = author || '';
      commentIdx = (commentIdx + 1) % COMMENTS.length;
      commentEl.textContent = COMMENTS[commentIdx];
      commentEl.classList.remove('changing');
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        isPlaying = true;
        playBtn.textContent = '⏸';
        playBtn.classList.add('playing');
        recordEl.classList.add('spinning');
        tonearmEl.classList.add('playing');
        eqEl.classList.add('active');
        var data = player.getVideoData();
        titleEl.classList.add('changing');
        commentEl.classList.add('changing');
        turntableEl.classList.add('fading');
        setTimeout(function() {
          updateTrackInfo(data);
          turntableEl.classList.remove('fading');
        }, 400);
      } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
        isPlaying = false;
        playBtn.textContent = '▶';
        playBtn.classList.remove('playing');
        recordEl.classList.remove('spinning');
        tonearmEl.classList.remove('playing');
        eqEl.classList.remove('active');
      }
    }

    function playPause() {
      if (!player) return;
      if (isPlaying) { player.pauseVideo(); }
      else { player.playVideo(); }
    }

    function nextTrack() {
      if (!player) return;
      if (isShuffle) { player.playVideoAt(Math.floor(Math.random() * player.getPlaylist().length)); }
      else { player.nextVideo(); }
    }

    function prevTrack() {
      if (!player) return;
      player.previousVideo();
    }

    function toggleShuffle() {
      isShuffle = !isShuffle;
      shuffleBtn.style.opacity = isShuffle ? '1' : '0.4';
    }

    // YouTube IFrame API
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: 240, width: 360,
        playerVars: {
          iv_load_policy: 3,
          modestbranding: 1,
          rel: 0,
          controls: 0,
          fs: 0,
          autoplay: 1,
          mute: 1
        },
        events: {
          onReady: function() {
            player.loadPlaylist({ list: PLAY_LIST_ID, listType: 'playlist', index: 0 });
          },
          onStateChange: onPlayerStateChange,
          onError: function(e) {
            var msgs = { 2:'재생목록 형식 오류', 5:'플레이어 오류', 100:'찾을 수 없는 영상', 101:'임베드 제한', 150:'임베드 제한' };
            titleEl.textContent = '주파수가 흐트러졌어요';
            artistEl.textContent = msgs[e.data] || '오류 코드: ' + e.data;
          }
        }
      });
    }

    // Load YouTube API
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    var firstScript = document.getElementsByTagName('script')[0];
    firstScript.parentNode.insertBefore(tag, firstScript);

    // Event listeners
    playBtn.addEventListener('click', playPause);
    prevBtn.addEventListener('click', prevTrack);
    nextBtn.addEventListener('click', nextTrack);
    shuffleBtn.addEventListener('click', toggleShuffle);
    shuffleBtn.style.opacity = '0.4';
    listToggle.style.display = 'none';
    tracklistEl.style.display = 'none';

    // Stars
    (function(){
      var c=document.getElementById('stars');
      for(var i=0;i<40;i++){
        var s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        s.style.setProperty('--d',(Math.random()*4+3)+'s');
        s.style.animationDelay=Math.random()*5+'s'; c.appendChild(s);
      }
    })();
  </script>
</body>
</html>
