<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>그리움이 닿는 곳 — 오라클</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    .message-overlay { overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom:max(7rem,env(safe-area-inset-bottom)); }
    .message-text { white-space: pre-wrap; }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="orb-wrapper">
    <div class="orb" id="orb" role="button" aria-label="메시지 열기">
      <div class="orb-inner"></div>
      <span class="orb-icon">✦</span>
    </div>
    <p class="prompt" id="prompt">질문을 떠올리고 수정구를 터치하세요</p>
  </div>

  <div class="message-overlay" id="overlay">
    <div class="message-card">
      <button class="close-btn" id="closeBtn">✕</button>
      <div class="message-number" id="msgNum"></div>
      <div class="message-text" id="msgText"></div>
      <div style="display:flex;gap:.5rem;margin-top:2rem;justify-content:center;flex-wrap:wrap">
        <button class="again-btn" id="againBtn">다시 열기</button>
      </div>
    </div>
  </div>

  <nav class="mode-nav">
    <a href="index.html" class="mode-btn active">오라클</a>
    <a href="../tarot/index.html" class="mode-btn">타로</a>
    <a href="../comfort/index.html" class="mode-btn">처방전</a>
    <a href="../capsule/index.html" class="mode-btn">캡슐</a>
    <a href="../wish/index.html" class="mode-btn">별자리</a>
    <a href="../book/index.html" class="mode-btn">서재</a>
    <a href="../radio/index.html" class="mode-btn">라디오</a>
  </nav>

  <div class="footer">오라클 <span>·</span> 그리움이 닿는 곳</div>

  <script src="poems.js"></script>
  <script>
    /* ================ STARS ================ */
    (function createStars() {
      const c = document.getElementById('stars');
      for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.width = s.style.height = (Math.random() * 2.5 + 1) + 'px';
        s.style.setProperty('--d', (Math.random() * 4 + 3) + 's');
        s.style.animationDelay = Math.random() * 5 + 's';
        c.appendChild(s);
      }
    })();

    /* ================ MAGIC 8 BALL LOGIC ================ */
    const orb = document.getElementById('orb');
    const overlay = document.getElementById('overlay');
    const msgText = document.getElementById('msgText');
    const msgNum = document.getElementById('msgNum');
    const closeBtn = document.getElementById('closeBtn');
    const againBtn = document.getElementById('againBtn');
    const prompt = document.getElementById('prompt');

    let usedToday = null;
    let lastIndex = -1;

    function getRandomPoem() {
      let idx;
      do {
        idx = Math.floor(Math.random() * POEMS.length);
      } while (idx === lastIndex && POEMS.length > 1);
      lastIndex = idx;
      return { index: idx + 1, text: POEMS[idx] };
    }

    var CATEGORIES = [
      { label:'긍정', emoji:'🔵', start:1, end:122 },
      { label:'중립', emoji:'🟡', start:123, end:243 },
      { label:'부정', emoji:'🔴', start:244, end:365 }
    ];

    function getCategory(index) {
      for (var i = 0; i < CATEGORIES.length; i++) {
        if (index >= CATEGORIES[i].start && index <= CATEGORIES[i].end) return CATEGORIES[i];
      }
      return CATEGORIES[0];
    }

    function showMessage() {
      const poem = getRandomPoem();
      const cat = getCategory(poem.index);
      msgNum.textContent = cat.emoji + ' ' + cat.label + ' · ' + String(poem.index) + ' / ' + POEMS.length;
      msgText.innerHTML = '<span class="line">' + poem.text + '</span>';
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function hideMessage() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => {
        msgText.innerHTML = '';
        msgNum.textContent = '';
      }, 300);
    }

    function activateOrb(e) {
      orb.classList.remove('activating');
      void orb.offsetWidth;
      orb.classList.add('activating');
      setTimeout(() => {
        orb.classList.remove('activating');
      }, 800);
      setTimeout(showMessage, 600);
    }

    let orbBusy = false;
    function handleOrb(e) {
      if (orbBusy) return;
      orbBusy = true;
      activateOrb(e);
      setTimeout(() => { orbBusy = false; }, 1000);
    }

    orb.addEventListener('click', handleOrb);
    orb.addEventListener('touchend', function(e) {
      if (orbBusy) return;
      e.preventDefault();
      handleOrb(e);
    });

    // Auto-show random message on load
    setTimeout(showMessage, 800);

    closeBtn.addEventListener('click', hideMessage);
    againBtn.addEventListener('click', function() {
      hideMessage();
      setTimeout(showMessage, 400);
    });
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) hideMessage();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') hideMessage();
    });
  </script>
</body>
</html>
