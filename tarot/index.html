<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>타로 - 그리움이 닿는 곳</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    /* ================ HEADER ================ */
    .tarot-header {
      position: fixed; top:0; left:0; right:0; z-index:50;
      padding:.85rem 2rem;
      background:rgba(7,7,13,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .tarot-header .back-link { color:var(--text-dim); text-decoration:none; font-family:var(--font-sans); font-size:.8rem; letter-spacing:.1em; transition:color .3s; }
    @media (hover:hover) { .tarot-header .back-link:hover { color:var(--gold); } }
    .tarot-header h1 { font-family:var(--font-serif); font-size:1rem; font-weight:300; color:var(--gold); letter-spacing:.15em; }
    .tarot-header .step-indicator { font-family:var(--font-sans); font-size:.75rem; color:var(--text-dim); }
    .tarot-header .step-indicator span { color:var(--gold); }

    /* ================ BODY ================ */
    .tarot-body { padding:5rem 1.5rem 2rem; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

    /* Question input */
    .question-area { width:100%; max-width:560px; margin:.8rem auto 1.5rem; text-align:center; }
    .question-input {
      width:100%; padding:1rem 1.2rem;
      background:var(--bg-card); border:1px solid var(--border);
      color:var(--text); font-family:var(--font-serif); font-size:.9rem;
      border-radius:4px; outline:none; transition:border-color .3s; resize:none;
      line-height:1.6;
    }
    .question-input::placeholder { color:var(--text-muted); font-weight:300; }
    .question-input:focus { border-color:var(--gold-dim); }
    .question-label { font-family:var(--font-sans); font-size:.7rem; letter-spacing:.15em; color:var(--text-muted); margin-bottom:.5rem; display:block; }
    .apikey-reset-btn { display:inline-block; margin-top:.4rem; background:none; border:none; color:var(--text-muted); font-family:var(--font-sans); font-size:.6rem; text-decoration:underline; cursor:pointer; opacity:.6; }
    .apikey-reset-btn:hover { opacity:1; color:var(--gold); }

    /* Prompt */
    .tarot-prompt { text-align:center; margin:0 0 1.5rem; font-family:var(--font-serif); font-size:.9rem; color:var(--text-dim); font-weight:300; line-height:1.8; }
    .tarot-prompt .highlight { color:var(--gold); }

    /* Grid */
    .tarot-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(84px,1fr)); gap:.55rem; max-width:960px; width:100%; margin:0 auto; }

    .tarot-card {
      aspect-ratio:5/7; border-radius:6px; cursor:pointer; position:relative;
      transition:all .3s ease; border:1.5px solid var(--border);
      background:linear-gradient(145deg,#1a1a2e,#12121a); overflow:hidden; user-select:none;
      touch-action:manipulation;
    }
    .tarot-card::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(201,169,110,0.03) 8px,rgba(201,169,110,0.03) 16px); }
    .tarot-card .card-pattern { position:absolute; inset:4px; border:1px solid rgba(201,169,110,0.08); border-radius:4px; display:flex; align-items:center; justify-content:center; }
    .tarot-card .card-pattern-inner { width:60%; height:60%; border:1px solid rgba(201,169,110,0.12); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.6rem; color:rgba(201,169,110,0.15); }
    .tarot-card.selected { border-color:var(--gold); box-shadow:0 0 20px rgba(201,169,110,0.3),inset 0 0 20px rgba(201,169,110,0.05); transform:translateY(-6px); }
    @media (hover:hover) { .tarot-card:hover { border-color:rgba(201,169,110,0.4); transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,0.3); } }
    .tarot-card:active { transform:scale(0.96); }
    .tarot-card.selected:active { transform:translateY(-4px) scale(0.96); }
    .tarot-card.selected::after { content:''; position:absolute; inset:-2px; border:2px solid var(--gold); border-radius:8px; pointer-events:none; }
    .tarot-card .sel-num { position:absolute; top:4px; right:4px; width:20px; height:20px; border-radius:50%; background:var(--gold); color:var(--bg); font-family:var(--font-sans); font-size:.65rem; display:none; align-items:center; justify-content:center; font-weight:600; z-index:2; }
    .tarot-card.selected .sel-num { display:flex; }
    .tarot-card.disabled { cursor:default; opacity:.45; }
    @media (hover:hover) { .tarot-card.disabled:hover { transform:none; box-shadow:none; border-color:var(--border); } }
    .tarot-card .orient-badge { position:absolute; bottom:4px; left:50%; transform:translateX(-50%); font-family:var(--font-sans); font-size:.5rem; letter-spacing:.1em; padding:1px 6px; border-radius:2px; z-index:2; display:none; }
    .tarot-card.selected .orient-badge { display:block; }
    .orient-upright { background:rgba(201,169,110,0.2); color:var(--gold); }
    .orient-reversed { background:rgba(180,100,120,0.2); color:#d490a0; }

    /* Reveal button */
    .reveal-area { margin:1.5rem 0 2.5rem; text-align:center; min-height:50px; display:flex; align-items:center; justify-content:center; }
    .reveal-btn { display:none; padding:.9rem 2.8rem; border:1px solid var(--gold); background:transparent; color:var(--gold); font-family:var(--font-sans); font-size:.8rem; letter-spacing:.2em; cursor:pointer; transition:all .4s; }
    .reveal-btn.visible { display:inline-block; animation:fadeUp .5s ease; }
    @media (hover:hover) { .reveal-btn:hover { background:var(--gold); color:var(--bg); } }
    .reveal-btn:active { transform:scale(0.96); }

    /* ================ RESULT ================ */
    .result-overlay { position:fixed; inset:0; z-index:100; display:none; background:rgba(7,7,13,0.95); backdrop-filter:blur(16px); padding:2rem; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .result-overlay.open { display:flex; align-items:flex-start; justify-content:center; }
    .result-container { max-width:860px; width:100%; padding-top:1rem; }

    .result-header { text-align:center; margin-bottom:1.5rem; }
    .result-header .label { font-size:.65rem; letter-spacing:.3em; color:var(--gold-dim); font-family:var(--font-sans); margin-bottom:.3rem; }
    .result-header .question-display { font-family:var(--font-serif); font-size:1rem; color:var(--text-dim); font-weight:300; margin-top:.3rem; font-style:italic; }
    .result-header .question-display::before { content:'"'; color:var(--gold-dim); }
    .result-header .question-display::after { content:'"'; color:var(--gold-dim); }
    .result-header h2 { font-family:var(--font-serif); font-size:1.4rem; font-weight:300; color:var(--text); }

    /* Combined reading */
    .combined-reading {
      background:var(--bg-card); border:1px solid var(--border);
      padding:1.8rem 2rem; margin-bottom:2rem; border-radius:4px;
      animation:fadeUp .6s ease forwards; opacity:0;
    }
    .combined-reading .cr-label { font-family:var(--font-sans); font-size:.65rem; letter-spacing:.2em; color:var(--gold-dim); margin-bottom:.6rem; }
    .combined-reading .cr-title { font-family:var(--font-serif); font-size:1.2rem; font-weight:400; color:var(--gold); margin-bottom:.8rem; }
    .combined-reading .cr-text { font-family:var(--font-serif); font-size:.92rem; line-height:1.9; color:var(--text); font-weight:300; }
    .combined-reading .cr-detail { margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border); font-family:var(--font-sans); font-size:.75rem; color:var(--text-dim); line-height:1.7; }
    .combined-reading .cr-detail span { color:var(--gold); }

    /* Result cards grid */
    .result-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1.2rem; margin-bottom:1.5rem; }

    .result-card {
      background:var(--bg-card); border:1px solid var(--border); padding:1.5rem;
      border-radius:4px; position:relative; opacity:0; animation:cardUp .6s ease forwards;
      border-left:3px solid var(--gold-dim);
    }
    .result-card:nth-child(1) { animation-delay:.1s; }
    .result-card:nth-child(2) { animation-delay:.3s; }
    .result-card:nth-child(3) { animation-delay:.5s; }
    .result-card.result-reversed { border-left-color:#d490a0; }

    .result-card .rc-pos { font-family:var(--font-sans); font-size:.6rem; letter-spacing:.15em; color:var(--gold-dim); margin-bottom:.3rem; }
    .result-card .rc-icon { font-size:1.6rem; margin-bottom:.5rem; display:block; }
    .result-card .rc-name { font-family:var(--font-serif); font-size:1rem; font-weight:400; color:var(--gold); margin-bottom:.15rem; }
    .result-card .rc-name-en { font-family:var(--font-sans); font-size:.65rem; color:var(--text-muted); margin-bottom:.4rem; letter-spacing:.05em; }
    .result-card .rc-orient {
      display:inline-block; font-family:var(--font-sans); font-size:.6rem;
      padding:2px 10px; border-radius:2px; margin-bottom:.8rem; letter-spacing:.1em;
    }
    .orient-upright-badge { background:rgba(201,169,110,0.15); color:var(--gold); }
    .orient-reversed-badge { background:rgba(180,100,120,0.15); color:#d490a0; }
    .result-card .rc-type { font-family:var(--font-sans); font-size:.6rem; color:var(--text-muted); letter-spacing:.1em; padding-bottom:.6rem; border-bottom:1px solid var(--border); margin-bottom:.8rem; }
    .result-card .rc-meaning { font-family:var(--font-serif); font-size:.85rem; line-height:1.8; color:var(--text); font-weight:300; }
    .result-card .rc-pos-desc { font-family:var(--font-sans); font-size:.65rem; color:var(--text-muted); margin-top:.6rem; font-style:italic; }

    .result-actions { text-align:center; padding:1rem 0 2rem; display:flex; gap:.5rem; justify-content:center; flex-wrap:wrap; }
    .result-btn { padding:.7rem 1.8rem; border:1px solid rgba(201,169,110,0.3); background:transparent; color:var(--text-dim); font-family:var(--font-sans); font-size:.7rem; letter-spacing:.15em; cursor:pointer; transition:all .3s; -webkit-touch-callout:none; }
    @media (hover:hover) { .result-btn:hover { border-color:var(--gold); color:var(--gold); } }
    .result-btn.primary { border-color:var(--gold); color:var(--gold); }
    @media (hover:hover) { .result-btn.primary:hover { background:var(--gold); color:var(--bg); } }
    .result-btn:active { transform:scale(0.96); }

    /* Animations */
    /* Loading */
    .cr-loading { display:none; text-align:center; padding:2rem 0; }
    .cr-loading.active { display:block; animation:fadeUp .4s ease; }
    .loading-dots { display:flex; gap:.5rem; justify-content:center; margin-bottom:1rem; }
    .loading-dots span { width:10px; height:10px; border-radius:50%; background:var(--gold); animation:loadDot 1.4s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay:.2s; }
    .loading-dots span:nth-child(3) { animation-delay:.4s; }
    @keyframes loadDot { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    .loading-text { font-family:var(--font-sans); font-size:.75rem; color:var(--text-dim); letter-spacing:.1em; }
    .cr-error { display:none; text-align:center; padding:1rem; margin-top:1rem; border:1px solid rgba(200,80,80,0.3); background:rgba(200,80,80,0.1); color:#d49090; font-family:var(--font-sans); font-size:.75rem; line-height:1.6; border-radius:4px; animation:fadeUp .4s ease; }
    .cr-error.active { display:block; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes cardUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    /* Responsive */
    @media (max-width:480px) {
      .tarot-header { padding:.6rem .8rem; }
      .tarot-header h1 { font-size:.85rem; }
      .tarot-header .back-link { font-size:.7rem; }
      .tarot-header .step-indicator { font-size:.65rem; }
      .tarot-body { padding:4rem .5rem 1rem; }
      .tarot-grid { grid-template-columns:repeat(auto-fill,minmax(56px,1fr)); gap:.3rem; }
      .tarot-card { border-radius:4px; border-width:1px; }
      .tarot-card .card-pattern { inset:2px; }
      .tarot-card .card-pattern-inner { width:50%; height:50%; font-size:.45rem; }
      .tarot-card .sel-num { width:16px; height:16px; font-size:.55rem; top:2px; right:2px; }
      .tarot-card .orient-badge { font-size:.4rem; padding:1px 4px; }
      .question-area { margin:.5rem auto 1rem; }
      .question-input { padding:.8rem 1rem; font-size:.8rem; }
      .tarot-prompt { font-size:.8rem; margin:0 0 1rem; }
      .reveal-btn { padding:.7rem 2rem; font-size:.7rem; }
      .result-overlay { padding:1rem; }
      .result-container { padding-top:.5rem; }
      .result-header h2 { font-size:1.1rem; }
      .result-header .question-display { font-size:.85rem; }
      .combined-reading { padding:1.2rem 1rem; }
      .combined-reading .cr-title { font-size:1rem; }
      .combined-reading .cr-text { font-size:.82rem; }
      .result-cards { grid-template-columns:1fr; gap:1rem; }
      .result-card { padding:1.2rem; }
      .result-actions { flex-direction:column; align-items:center; gap:.4rem; }
      .result-btn { width:100%; max-width:280px; padding:.65rem 1.5rem; font-size:.65rem; }
    }
    @media (min-width:481px) and (max-width:768px) {
      .tarot-header { padding:.7rem 1.2rem; }
      .tarot-grid { grid-template-columns:repeat(auto-fill,minmax(68px,1fr)); gap:.4rem; }
      .tarot-body { padding:4.8rem 1rem 1.5rem; }
    }
    @media (min-width:769px) and (max-width:1024px) {
      .tarot-grid { grid-template-columns:repeat(auto-fill,minmax(78px,1fr)); gap:.45rem; }
    }
    @media (min-width:900px) { .tarot-grid { grid-template-columns:repeat(10,1fr); } }
    @supports (padding:max(0px)) {
      .tarot-header { padding-left:max(.85rem,env(safe-area-inset-left)); padding-right:max(.85rem,env(safe-area-inset-right)); }
      .tarot-body { padding-left:max(1.5rem,env(safe-area-inset-left)); padding-right:max(1.5rem,env(safe-area-inset-right)); }
      .result-overlay { padding-left:max(2rem,env(safe-area-inset-left)); padding-right:max(2rem,env(safe-area-inset-right)); }
    }
  </style>
</head>
<body>
  <header class="tarot-header">
    <a href="../index.html" class="back-link">← 처음으로</a>
    <h1>✦ 타로 리딩</h1>
    <div class="step-indicator"><span id="selectedCount">0</span> / 3 선택됨</div>
  </header>

  <main class="tarot-body">
    <div class="question-area">
      <label class="question-label" for="qInput">당신의 질문을 적어보세요</label>
      <textarea class="question-input" id="qInput" rows="2" placeholder="예) 나에게 다가올 변화는 무엇일까요…"></textarea>
      <button class="apikey-reset-btn" id="apiKeyResetBtn">API 키 변경</button>
    </div>

    <p class="tarot-prompt">
      마음을 집중하고 <span class="highlight">3장의 카드</span>를 선택하세요<br/>
      <span style="font-size:.75rem;color:var(--text-muted)">각 카드는 무작위로 정방향 또는 역방향으로 나타납니다</span>
    </p>

    <div class="tarot-grid" id="tarotGrid"></div>

    <div class="reveal-area">
      <button class="reveal-btn" id="revealBtn">선택한 카드 펼치기</button>
    </div>
  </main>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-container">
      <div class="result-header">
        <p class="label">Tarot Reading · 3-Card Spread</p>
        <h2>당신을 위한 메시지</h2>
        <div class="question-display" id="resultQuestion"></div>
      </div>

      <div class="combined-reading" id="combinedReading">
        <div class="cr-label">✦ 종합 해석</div>
        <div class="cr-title" id="crTitle"></div>
        <div class="cr-text" id="crText"></div>
        <div class="cr-detail" id="crDetail"></div>
        <div class="cr-loading" id="crLoading">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
          <p class="loading-text">별자리가 답을 읽고 있습니다…</p>
        </div>
        <div class="cr-error" id="crError"></div>
      </div>

      <div class="result-cards" id="resultCards"></div>

      <div class="result-actions">
        <button class="result-btn" id="resultCloseBtn">다시 선택하기</button>
        <button class="result-btn primary" id="resultRedrawBtn">새로 뽑기</button>
      </div>
    </div>
  </div>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script src="tarot.js"></script>
  <script>
    const grid=document.getElementById('tarotGrid');
    const selectedCount=document.getElementById('selectedCount');
    const revealBtn=document.getElementById('revealBtn');
    const resultOverlay=document.getElementById('resultOverlay');
    const resultCards=document.getElementById('resultCards');
    const resultCloseBtn=document.getElementById('resultCloseBtn');
    const resultRedrawBtn=document.getElementById('resultRedrawBtn');
    const resultQuestion=document.getElementById('resultQuestion');
    const crTitle=document.getElementById('crTitle');
    const crText=document.getElementById('crText');
    const crDetail=document.getElementById('crDetail');
    const crLoading=document.getElementById('crLoading');
    const crError=document.getElementById('crError');
    const qInput=document.getElementById('qInput');

    let GEMINI_API_KEY = localStorage.getItem('gemini_api_key');
    if (!GEMINI_API_KEY) {
      GEMINI_API_KEY = prompt('Gemini API 키를 입력하세요 (https://aistudio.google.com/apikey 에서 발급)');
      if (GEMINI_API_KEY) localStorage.setItem('gemini_api_key', GEMINI_API_KEY);
    }
    document.getElementById('apiKeyResetBtn').addEventListener('click', () => {
      const newKey = prompt('새 Gemini API 키를 입력하세요');
      if (newKey) { localStorage.setItem('gemini_api_key', newKey); GEMINI_API_KEY = newKey; }
    });

    const MAX_SELECT=3;
    const POSITIONS=['과거의 근원','현재의 상황','미래의 조언'];
    const POS_DESC=[
      '이 카드는 현재 상황의 뿌리를 나타냅니다. 과거의 경험과 선택이 지금에 영향을 주고 있습니다.',
      '이 카드는 지금 당신이 서 있는 자리를 나타냅니다. 현재의 에너지와 도전을 보여줍니다.',
      '이 카드는 앞으로의 방향을 제시합니다. 당신이 취할 수 있는 조언과 잠재적 결과입니다.'
    ];

    let selected=[]; // [{deckIdx, reversed}]

    // Render deck
    TAROT_DECK.forEach((card,idx)=>{
      const el=document.createElement('div');
      el.className='tarot-card';
      el.dataset.index=idx;
      el.innerHTML=`<div class="card-pattern"><div class="card-pattern-inner">✦</div></div><div class="sel-num"></div><div class="orient-badge"></div>`;
      el.addEventListener('click',()=>toggleSelect(el,idx));
      grid.appendChild(el);
    });

    function toggleSelect(el,idx){
      if(el.classList.contains('disabled')) return;
      if(el.classList.contains('selected')){
        el.classList.remove('selected');
        selected=selected.filter(s=>s.deckIdx!==idx);
      }else{
        if(selected.length>=MAX_SELECT) return;
        const reversed=Math.random()<0.5;
        selected.push({deckIdx:idx,reversed});
        el.classList.add('selected');
        const badge=el.querySelector('.orient-badge');
        badge.textContent=reversed?'역방향 ↓':'정방향 ↑';
        badge.className='orient-badge '+(reversed?'orient-reversed':'orient-upright');
      }
      updateNumbers();
      updateUI();
    }

    function updateNumbers(){
      document.querySelectorAll('.tarot-card').forEach(card=>{
        const idx=parseInt(card.dataset.index);
        const found=selected.findIndex(s=>s.deckIdx===idx);
        card.querySelector('.sel-num').textContent=found!==-1?found+1:'';
      });
    }

    function updateUI(){
      selectedCount.textContent=selected.length;
      document.querySelectorAll('.tarot-card').forEach(card=>{
        const idx=parseInt(card.dataset.index);
        const isSel=selected.some(s=>s.deckIdx===idx);
        if(selected.length>=MAX_SELECT && !isSel) card.classList.add('disabled');
        else card.classList.remove('disabled');
      });
      revealBtn.classList.toggle('visible',selected.length===MAX_SELECT);
    }

    // Reveal
    revealBtn.addEventListener('click',revealCards);
    resultCloseBtn.addEventListener('click',autoDraw);
    resultRedrawBtn.addEventListener('click',()=>{ shuffleGrid(); resetSelection(); window.scrollTo({top:0,behavior:'smooth'}); });

    function shuffleGrid(){
      const cards=Array.from(grid.children);
      for(let i=cards.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [cards[i],cards[j]]=[cards[j],cards[i]];
      }
      cards.forEach(c=>grid.appendChild(c));
    }

    function autoDraw(){
      // Generate 3 random unique cards
      const indices=[];
      while(indices.length<MAX_SELECT){
        const r=Math.floor(Math.random()*TAROT_DECK.length);
        if(!indices.includes(r)) indices.push(r);
      }
      selected=indices.map(idx=>({deckIdx:idx,reversed:Math.random()<0.5}));
      revealCards();
    }

    function getMeaning(card,reversed){
      return reversed?card.reversed:card.upright;
    }

    async function callGeminiReading(cardData, hasQuestion, question) {

      const cardInfo = cardData.map((d, i) => {
        const c = d.card;
        return `[${d.posName}]
카드: ${c.name} (${c.nameEn})
방향: ${d.reversed ? '역방향' : '정방향'}
타입: ${c.type === 'major' ? '메이저 아르카나' : `${c.suitName} (${c.element})`}
키워드: ${c.keywords || ''}
의미: ${getMeaning(c, d.reversed)}`;
      }).join('\n\n');

      const prompt = hasQuestion
        ? `당신은 타로 리더입니다. 아래 정보를 바탕으로 따뜻하고 통찰력 있는 타로 리딩을 한국어로 제공해주세요.

질문: ${question}

선택된 카드 3장:
${cardInfo}

다음 JSON 형식으로만 응답해주세요 (다른 설명 없이 JSON만):
{
  "title": "3-5글자 이내의 리딩 제목",
  "text": "종합 해석 (4-6문장, 따뜻한 어조, 카드들의 연결성을 담아)",
  "detail": "메이저/마이너 수, 방향성, 원소 정보 등 통계 (예: 메이저 1장 · 역방향 1장 · 원소 불 2개 · 물 1개)"
}`
        : `당신은 타로 리더입니다. 질문 없이 찾아온 이를 위해 일반적인 운의 흐름과 카드의 상징에 대한 타로 리딩을 한국어로 제공해주세요.

선택된 카드 3장:
${cardInfo}

다음 JSON 형식으로만 응답해주세요 (다른 설명 없이 JSON만):
{
  "title": "3-5글자 이내의 리딩 제목",
  "text": "종합 해석 (4-6문장, 운의 흐름과 상징 중심으로)",
  "detail": "메이저/마이너 수, 방향성, 원소 정보 등 통계 (예: 메이저 1장 · 역방향 1장 · 원소 불 2개 · 물 1개)"
}`;

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${GEMINI_API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: {
              temperature: 0.8,
              maxOutputTokens: 1024
            }
          })
        }
      );

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`Gemini API 오류 (${res.status}): ${err}`);
      }

      const data = await res.json();
      const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text;

      if (!raw) throw new Error('Gemini 응답을 읽을 수 없습니다.');

      try {
        const json = JSON.parse(raw.replace(/^```(?:json)?\s*/, '').replace(/\s*```$/, ''));
        if (!json.title || !json.text) throw new Error('응답 형식이 올바르지 않습니다.');
        return json;
      } catch (e) {
        throw new Error('Gemini 응답을 파싱하는 중 오류가 발생했습니다.');
      }
    }

    function setLoading(show) {
      crLoading.classList.toggle('active', show);
      crTitle.style.display = show ? 'none' : '';
      crText.style.display = show ? 'none' : '';
      crDetail.style.display = show ? 'none' : '';
    }

    function setError(msg) {
      crError.textContent = msg;
      crError.classList.add('active');
    }

    function buildCardHtml(cardData) {
      resultCards.innerHTML = '';
      cardData.forEach((d, i) => {
        const c = d.card;
        const orientText = d.reversed ? '역방향' : '정방향';
        const orientClass = d.reversed ? 'orient-reversed-badge' : 'orient-upright-badge';
        const suitInfo = c.suit ? `${c.suitName} (${c.element})` : '메이저 아르카나';
        const meaning = getMeaning(c, d.reversed);

        const div = document.createElement('div');
        div.className = 'result-card' + (d.reversed ? ' result-reversed' : '');
        div.innerHTML = `
          <div class="rc-pos">CARD ${i+1} · ${d.posName}</div>
          <span class="rc-icon">${c.symbol || '🃏'}</span>
          <div class="rc-name">${c.name}</div>
          <div class="rc-name-en">${c.nameEn}</div>
          <div class="rc-orient ${orientClass}">${orientText}</div>
          <div class="rc-type">${suitInfo}</div>
          <div class="rc-meaning">${meaning}</div>
          <div class="rc-pos-desc">${d.posDesc}</div>
        `;
        resultCards.appendChild(div);
      });
    }

    async function revealCards() {
      if (selected.length !== MAX_SELECT) return;

      const hasQuestion = qInput.value.trim().length > 0;
      const question = qInput.value.trim() || '질문없음';

      const cardData = selected.map((s, i) => {
        const card = TAROT_DECK[s.deckIdx];
        return { card, reversed: s.reversed, position: i, posName: POSITIONS[i], posDesc: POS_DESC[i] };
      });

      // Show overlay immediately with loading
      resultQuestion.textContent = question;
      resultCards.innerHTML = '';
      crTitle.textContent = '';
      crText.textContent = '';
      crDetail.textContent = '';
      crError.classList.remove('active');
      setLoading(true);
      resultOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      try {
        const reading = await callGeminiReading(cardData, hasQuestion, question);
        setLoading(false);
        crTitle.textContent = reading.title;
        crText.textContent = reading.text;
        crDetail.innerHTML = reading.detail;
        buildCardHtml(cardData);
      } catch (e) {
        setLoading(false);
        setError(e.message || 'AI 해석 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        buildCardHtml(cardData);
      }
    }

    function resetSelection(){
      resultOverlay.classList.remove('open');
      document.body.style.overflow='';
      selected=[];
      document.querySelectorAll('.tarot-card').forEach(card=>{
        card.classList.remove('selected','disabled');
        card.querySelector('.orient-badge').textContent='';
        card.querySelector('.orient-badge').className='orient-badge';
      });
      updateNumbers();
      updateUI();
    }

    resultOverlay.addEventListener('click',e=>{ if(e.target===resultOverlay) resetSelection(); });
    document.addEventListener('keydown',e=>{ if(e.key==='Escape') resetSelection(); });
  </script>
</body>
</html>
