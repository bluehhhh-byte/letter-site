<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>타로 - 그리움이 닿는 곳</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    html, body { overflow-x:hidden; max-width:100vw; }
    /* ================ HEADER ================ */
    .tarot-header {
      position: fixed; top:0; left:0; right:0; z-index:50;
      padding:.85rem 2rem;
      background:rgba(7,7,13,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .tarot-header .back-link { color:var(--text-dim); text-decoration:none; font-family:var(--font-sans); font-size:.8rem; letter-spacing:.1em; transition:color .3s; }
    @media (hover:hover) { .tarot-header .back-link:hover { color:var(--gold); } }
    .tarot-header h1 { font-family:var(--font-serif); font-size:1rem; font-weight:300; color:var(--gold); letter-spacing:.15em; }
    .tarot-header .step-indicator { font-family:var(--font-sans); font-size:.75rem; color:var(--text-dim); }
    .tarot-header .step-indicator span { color:var(--gold); }

    /* ================ BODY ================ */
    .tarot-body { padding:5rem 1.5rem 8rem; min-height:100vh; display:flex; flex-direction:column; align-items:center; overscroll-behavior:none; max-width:100vw; overflow-x:hidden; }

    /* Question input */
    .question-area { width:100%; max-width:560px; margin:.8rem auto 1.5rem; text-align:center; }
    .question-input {
      width:100%; padding:1rem 1.2rem;
      background:var(--bg-card); border:1px solid var(--border);
      color:var(--text); font-family:var(--font-serif); font-size:.9rem;
      border-radius:4px; outline:none; transition:border-color .3s; resize:none;
      line-height:1.6;
    }
    .question-input::placeholder { color:var(--text-muted); font-weight:300; }
    .question-input:focus { border-color:var(--gold-dim); }
    .question-label { font-family:var(--font-sans); font-size:.7rem; letter-spacing:.15em; color:var(--text-muted); margin-bottom:.5rem; display:block; }

    /* Spread selector */
    .spread-area { width:100%; max-width:560px; margin:0 auto 1rem; text-align:center; }
    .spread-label { font-family:var(--font-sans); font-size:.65rem; letter-spacing:.15em; color:var(--text-muted); margin-bottom:.5rem; display:block; }
    .spread-btns { display:flex; gap:.35rem; justify-content:center; flex-wrap:wrap; }
    .spread-btn {
      padding:.5rem 1rem; border:1px solid var(--border); background:var(--bg-card);
      color:var(--text-dim); font-family:var(--font-sans); font-size:.7rem; letter-spacing:.05em;
      cursor:pointer; transition:all .3s; border-radius:3px; touch-action:manipulation; user-select:none;
    }
    .spread-btn:hover { border-color:rgba(201,169,110,0.3); color:var(--text); }
    .spread-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(201,169,110,0.08); }
    .spread-btn .cnt { display:block; font-size:.85rem; font-weight:400; color:var(--gold-dim); margin-bottom:2px; }
    .spread-btn.active .cnt { color:var(--gold); }
    .spread-name-display { font-family:var(--font-serif); font-size:.85rem; color:var(--gold-dim); margin-top:.5rem; font-weight:300; }
    .spread-name-display .summary { display:block; font-family:var(--font-sans); font-size:.65rem; color:var(--text-muted); margin-top:.2rem; font-weight:300; line-height:1.5; }

    /* Grid */
    .tarot-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(84px,1fr)); gap:.55rem; max-width:960px; width:100%; margin:0 auto; overflow:hidden; }

    .tarot-card {
      aspect-ratio:5/7; border-radius:6px; cursor:pointer; position:relative;
      transition:all .3s ease; border:1.5px solid var(--border);
      background:linear-gradient(145deg,#1a1a2e,#12121a); overflow:hidden; user-select:none;
      touch-action:manipulation;
    }
    .tarot-card::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(201,169,110,0.03) 8px,rgba(201,169,110,0.03) 16px); }
    .tarot-card .card-pattern { position:absolute; inset:4px; border:1px solid rgba(201,169,110,0.08); border-radius:4px; display:flex; align-items:center; justify-content:center; }
    .tarot-card .card-pattern-inner { width:60%; height:60%; border:1px solid rgba(201,169,110,0.12); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.6rem; color:rgba(201,169,110,0.15); }
    .tarot-card.selected { border-color:var(--gold); box-shadow:0 0 20px rgba(201,169,110,0.3),inset 0 0 20px rgba(201,169,110,0.05); transform:translateY(-6px); }
    @media (hover:hover) { .tarot-card:hover { border-color:rgba(201,169,110,0.4); transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,0.3); } }
    .tarot-card:active { transform:scale(0.96); }
    .tarot-card.selected:active { transform:translateY(-4px) scale(0.96); }
    .tarot-card.selected::after { content:''; position:absolute; inset:-2px; border:2px solid var(--gold); border-radius:8px; pointer-events:none; }
    .tarot-card .sel-num { position:absolute; top:4px; right:4px; width:20px; height:20px; border-radius:50%; background:var(--gold); color:var(--bg); font-family:var(--font-sans); font-size:.65rem; display:none; align-items:center; justify-content:center; font-weight:600; z-index:2; }
    .tarot-card.selected .sel-num { display:flex; }
    .tarot-card.disabled { cursor:default; opacity:.45; }
    @media (hover:hover) { .tarot-card.disabled:hover { transform:none; box-shadow:none; border-color:var(--border); } }
    .tarot-card .orient-badge { position:absolute; bottom:4px; left:50%; transform:translateX(-50%); font-family:var(--font-sans); font-size:.5rem; letter-spacing:.1em; padding:1px 6px; border-radius:2px; z-index:2; display:none; }
    .tarot-card.selected .orient-badge { display:block; }
    .orient-upright { background:rgba(201,169,110,0.2); color:var(--gold); }
    .orient-reversed { background:rgba(180,100,120,0.2); color:#d490a0; }

    /* Reveal button */
    .reveal-area { margin:1.5rem 0 2.5rem; text-align:center; min-height:50px; display:flex; align-items:center; justify-content:center; }
    .reveal-btn { display:none; padding:.9rem 2.8rem; border:1px solid var(--gold); background:transparent; color:var(--gold); font-family:var(--font-sans); font-size:.8rem; letter-spacing:.2em; cursor:pointer; transition:all .4s; }
    .reveal-btn.visible { display:inline-block; animation:fadeUp .5s ease; }
    @media (hover:hover) { .reveal-btn:hover { background:var(--gold); color:var(--bg); } }
    .reveal-btn:active { transform:scale(0.96); }

    /* ================ RESULT ================ */
    .result-overlay { position:fixed; inset:0; z-index:100; display:none; background:rgba(7,7,13,0.96); backdrop-filter:blur(12px); overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .result-overlay.open { display:flex; align-items:flex-start; justify-content:center; }
    .result-container { max-width:860px; width:100%; padding:1rem 1rem 2rem; }

    .result-header { text-align:center; margin-bottom:1rem; }
    .result-header .label { font-size:.6rem; letter-spacing:.25em; color:var(--gold-dim); font-family:var(--font-sans); margin-bottom:.2rem; }
    .result-header .question-display { font-family:var(--font-serif); font-size:.85rem; color:var(--text-dim); font-weight:300; margin-top:.2rem; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:90vw; }
    .result-header .question-display::before { content:'"'; color:var(--gold-dim); }
    .result-header .question-display::after { content:'"'; color:var(--gold-dim); }
    .result-header h2 { font-family:var(--font-serif); font-size:1.15rem; font-weight:300; color:var(--text); }

    /* Combined reading */
    .combined-reading {
      background:var(--bg-card); border:1px solid var(--border);
      padding:1rem 1.2rem; margin-bottom:1rem; border-radius:4px;
      animation:fadeUp .6s ease forwards; opacity:0;
    }
    .combined-reading .cr-label { font-family:var(--font-sans); font-size:.6rem; letter-spacing:.15em; color:var(--gold-dim); margin-bottom:.4rem; }
    .combined-reading .cr-title { font-family:var(--font-serif); font-size:1rem; font-weight:400; color:var(--gold); margin-bottom:.5rem; }
    .combined-reading .cr-text { font-family:var(--font-serif); font-size:.85rem; line-height:1.7; color:var(--text); font-weight:300; white-space:pre-line; }
    .combined-reading .cr-detail { margin-top:.6rem; padding-top:.6rem; border-top:1px solid var(--border); font-family:var(--font-sans); font-size:.7rem; color:var(--text-dim); line-height:1.6; }
    .combined-reading .cr-detail span { color:var(--gold); }

    @media (min-width:600px) {
      .result-overlay { padding:2rem; }
      .result-container { padding:1rem 0; }
      .combined-reading { padding:1.8rem 2rem; margin-bottom:2rem; }
      .combined-reading .cr-text { font-size:.92rem; white-space:pre-line; }
      .result-header h2 { font-size:1.4rem; }
    }

    /* Result cards grid */
    .result-cards { display:grid; grid-template-columns:1fr; gap:.8rem; margin-bottom:1rem; }
    @media (min-width:600px) { .result-cards { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1.2rem; margin-bottom:1.5rem; } }

    .result-card {
      background:var(--bg-card); border:1px solid var(--border); padding:1rem;
      border-radius:4px; position:relative; opacity:0; animation:cardUp .5s ease forwards;
      border-left:3px solid var(--gold-dim);
    }
    .result-card.result-reversed { border-left-color:#d490a0; }

    .result-card .rc-pos { font-family:var(--font-sans); font-size:.55rem; letter-spacing:.12em; color:var(--gold-dim); margin-bottom:.15rem; }
    .result-card .rc-icon { font-size:1.2rem; margin-bottom:.3rem; display:block; }
    .result-card .rc-name { font-family:var(--font-serif); font-size:.9rem; font-weight:400; color:var(--gold); margin-bottom:.1rem; }
    .result-card .rc-name-en { font-family:var(--font-sans); font-size:.6rem; color:var(--text-muted); margin-bottom:.3rem; letter-spacing:.03em; }
    .result-card .rc-orient {
      display:inline-block; font-family:var(--font-sans); font-size:.55rem;
      padding:1px 8px; border-radius:2px; margin-bottom:.5rem; letter-spacing:.08em;
    }
    .orient-upright-badge { background:rgba(201,169,110,0.15); color:var(--gold); }
    .orient-reversed-badge { background:rgba(180,100,120,0.15); color:#d490a0; }
    .result-card .rc-type { font-family:var(--font-sans); font-size:.55rem; color:var(--text-muted); letter-spacing:.08em; padding-bottom:.4rem; border-bottom:1px solid var(--border); margin-bottom:.5rem; }
    .result-card .rc-meaning { font-family:var(--font-serif); font-size:.8rem; line-height:1.6; color:var(--text); font-weight:300; }
    .result-card .rc-pos-desc { font-family:var(--font-sans); font-size:.6rem; color:var(--text-muted); margin-top:.4rem; font-style:italic; }

    .result-actions { text-align:center; padding:.5rem 0 9rem; display:flex; gap:.4rem; justify-content:center; flex-wrap:wrap; }
    .result-btn { padding:.6rem 1.2rem; border:1px solid rgba(201,169,110,0.3); background:transparent; color:var(--text-dim); font-family:var(--font-sans); font-size:.65rem; letter-spacing:.1em; cursor:pointer; transition:all .3s; -webkit-touch-callout:none; }
    @media (min-width:600px) {
      .result-actions { padding:1rem 0 9rem; gap:.5rem; }
      .result-btn { padding:.7rem 1.8rem; font-size:.7rem; letter-spacing:.15em; }
      .result-card { padding:1.5rem; }
      .result-card .rc-icon { font-size:1.6rem; }
      .result-card .rc-name { font-size:1rem; }
      .result-card .rc-meaning { font-size:.85rem; }
    }
    @media (hover:hover) { .result-btn:hover { border-color:var(--gold); color:var(--gold); } }
    .result-btn.primary { border-color:var(--gold); color:var(--gold); }
    @media (hover:hover) { .result-btn.primary:hover { background:var(--gold); color:var(--bg); } }
    .result-btn:active { transform:scale(0.96); }

    /* Animations */
    /* Loading */
    .cr-loading { display:none; text-align:center; padding:2rem 0; }
    .cr-loading.active { display:block; animation:fadeUp .4s ease; }
    .loading-dots { display:flex; gap:.5rem; justify-content:center; margin-bottom:1rem; }
    .loading-dots span { width:10px; height:10px; border-radius:50%; background:var(--gold); animation:loadDot 1.4s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay:.2s; }
    .loading-dots span:nth-child(3) { animation-delay:.4s; }
    @keyframes loadDot { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    .loading-text { font-family:var(--font-sans); font-size:.75rem; color:var(--text-dim); letter-spacing:.1em; }
    .cr-error { display:none; text-align:center; padding:1rem; margin-top:1rem; border:1px solid rgba(200,80,80,0.3); background:rgba(200,80,80,0.1); color:#d49090; font-family:var(--font-sans); font-size:.75rem; line-height:1.6; border-radius:4px; animation:fadeUp .4s ease; }
    .cr-error.active { display:block; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes cardUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    /* Responsive */
    @media (max-width:480px) {
      .tarot-header { padding:.5rem .6rem; }
      .tarot-header h1 { font-size:.8rem; }
      .tarot-header .back-link { font-size:.65rem; }
      .tarot-header .step-indicator { font-size:.6rem; }
      .tarot-body { padding:3.8rem .4rem 7rem; }
      .tarot-grid { grid-template-columns:repeat(auto-fill,minmax(48px,1fr)); gap:.25rem; }
      .tarot-card { border-radius:3px; border-width:1px; }
      .tarot-card .card-pattern { inset:1.5px; }
      .tarot-card .card-pattern-inner { width:45%; height:45%; font-size:.4rem; }
      .tarot-card .sel-num { width:14px; height:14px; font-size:.5rem; top:1.5px; right:1.5px; }
      .tarot-card .orient-badge { font-size:.35rem; padding:1px 3px; bottom:2px; }
      .tarot-card.selected { transform:translateY(-3px); }
      .question-area { margin:.4rem auto .8rem; }
      .question-input { padding:.7rem .9rem; font-size:.8rem; }
      .spread-btn { padding:.4rem .7rem; font-size:.6rem; }
      .spread-btn .cnt { font-size:.75rem; }
      .reveal-btn { padding:.65rem 1.8rem; font-size:.65rem; }
      .result-overlay { padding:.6rem; overflow-y:auto; }
      .result-overlay.open { display:block; }
      .result-container { padding-top:.3rem; }
      .result-header { margin-bottom:1rem; }
      .result-header h2 { font-size:1rem; }
      .result-header .question-display { font-size:.8rem; }
      .combined-reading { padding:1rem .9rem; }
      .combined-reading .cr-title { font-size:.95rem; }
      .combined-reading .cr-text { font-size:.78rem; line-height:1.8; }
      .combined-reading .cr-detail { font-size:.7rem; }
      .result-cards { grid-template-columns:1fr; gap:.8rem; }
      .result-card { padding:1rem; }
      .result-card .rc-icon { font-size:1.3rem; }
      .result-card .rc-name { font-size:.9rem; }
      .result-card .rc-meaning { font-size:.8rem; }
      .result-card .rc-pos-desc { font-size:.6rem; }
      .result-actions { flex-direction:column; align-items:center; gap:.35rem; }
      .result-btn { width:100%; max-width:260px; padding:.6rem 1.2rem; font-size:.6rem; }
      .cr-loading { padding:1.5rem 0; }
      .loading-dots span { width:8px; height:8px; }
      .loading-text { font-size:.65rem; }
      .cr-error { font-size:.7rem; padding:.8rem; }
    }
    @media (max-width:374px) {
      .tarot-grid { grid-template-columns:repeat(auto-fill,minmax(42px,1fr)); gap:.2rem; }
      .tarot-body { padding:3.5rem .3rem 7rem; }
      .tarot-header { padding:.4rem .5rem; }
      .tarot-header h1 { font-size:.7rem; }
      .result-overlay { padding:.4rem; }
    }
    @media (min-width:481px) and (max-width:768px) {
      .tarot-header { padding:.7rem 1.2rem; }
      .tarot-grid { grid-template-columns:repeat(auto-fill,minmax(68px,1fr)); gap:.4rem; }
      .tarot-body { padding:4.8rem 1rem 7rem; }
    }
    @media (min-width:769px) and (max-width:1024px) {
      .tarot-grid { grid-template-columns:repeat(auto-fill,minmax(78px,1fr)); gap:.45rem; }
    }
    @media (min-width:900px) { .tarot-grid { grid-template-columns:repeat(10,1fr); } }
    @supports (padding:max(0px)) {
      .tarot-header { padding-left:max(.85rem,env(safe-area-inset-left)); padding-right:max(.85rem,env(safe-area-inset-right)); }
      .tarot-body { padding-left:max(1.5rem,env(safe-area-inset-left)); padding-right:max(1.5rem,env(safe-area-inset-right)); padding-bottom:max(7rem,env(safe-area-inset-bottom)); }
      .result-overlay { padding-left:max(1rem,env(safe-area-inset-left)); padding-right:max(1rem,env(safe-area-inset-right)); padding-bottom:max(2rem,env(safe-area-inset-bottom)); }
      .result-actions { padding-bottom:max(2rem,env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <header class="tarot-header">
    <a href="../index.html" class="back-link">← 처음으로</a>
    <h1>✦ 타로 리딩</h1>
    <div class="step-indicator"><span id="selectedCount">0</span> / <span id="maxCount">3</span> 선택됨 · <span id="spreadNameHeader">삼장 스프레드</span></div>
  </header>

  <main class="tarot-body">
    <div class="question-area">
      <label class="question-label" for="qInput">당신의 질문을 적어보세요</label>
      <textarea class="question-input" id="qInput" rows="2" placeholder="예) 나에게 다가올 변화는 무엇일까요…"></textarea>
    </div>

    <div class="spread-area">
      <label class="spread-label">스프레드 선택</label>
      <div class="spread-btns" id="spreadBtns"></div>
      <div class="spread-name-display" id="spreadNameDisplay"></div>
    </div>

    <div class="tarot-grid" id="tarotGrid"></div>

    <div class="reveal-area">
      <button class="reveal-btn" id="revealBtn">선택한 카드 펼치기</button>
    </div>
  </main>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-container">
      <div class="result-header">
        <p class="label">Tarot Reading · <span id="resultSpreadLabel">3-Card Spread</span></p>
        <h2>당신을 위한 메시지</h2>
        <div class="question-display" id="resultQuestion"></div>
      </div>

      <div class="combined-reading" id="combinedReading">
        <div class="cr-label">✦ 종합 해석</div>
        <div class="cr-title" id="crTitle"></div>
        <div class="cr-text" id="crText"></div>
        <div class="cr-detail" id="crDetail"></div>
        <div class="cr-loading" id="crLoading">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
          <p class="loading-text">별자리가 답을 읽고 있습니다…</p>
        </div>
        <div class="cr-error" id="crError"></div>
      </div>

      <div class="result-cards" id="resultCards"></div>

      <div class="result-actions">
        <button class="result-btn" id="resultCloseBtn">다시 선택하기</button>
        <button class="result-btn" id="resultCopyPromptBtn">📋 프롬프트 복사</button>
        <button class="result-btn primary" id="resultAISummaryBtn">🔍 AI 요약</button>
        <button class="result-btn" id="resultRedrawBtn">새로 뽑기</button>
      </div>
    </div>

  </nav>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script src="tarot.js"></script>
  <script>
    const grid=document.getElementById('tarotGrid');
    const selectedCount=document.getElementById('selectedCount');
    const revealBtn=document.getElementById('revealBtn');
    const resultOverlay=document.getElementById('resultOverlay');
    const resultCards=document.getElementById('resultCards');
    const resultCloseBtn=document.getElementById('resultCloseBtn');
    const resultRedrawBtn=document.getElementById('resultRedrawBtn');
    const resultQuestion=document.getElementById('resultQuestion');
    const crTitle=document.getElementById('crTitle');
    const crText=document.getElementById('crText');
    const crDetail=document.getElementById('crDetail');
    const crLoading=document.getElementById('crLoading');
    const crError=document.getElementById('crError');
    const qInput=document.getElementById('qInput');

    // ─── Spreads ──────────────────────────────────────────────────────────
    const SPREADS = {
      '1': { name:'원카드 스프레드', label:'1-Card', cnt:1, header:'원카드 스프레드 · 집중 조언', summary:'한 장의 카드로 지금 당신에게 가장 필요한 메시지를 얻습니다.', positions:['오늘의 메시지'], descs:['이 카드는 지금 당신에게 가장 필요한 에너지를 나타냅니다.'] },
      '3': { name:'삼장 스프레드', label:'3-Card', cnt:3, header:'삼장 스프레드 · 과거/현재/미래', summary:'과거의 영향, 현재의 상황, 미래의 조언을 시간의 흐름에 따라 조망합니다.', positions:['과거의 근원','현재의 상황','미래의 조언'], descs:['이 카드는 현재 상황의 뿌리를 나타냅니다. 과거의 경험과 선택이 지금에 영향을 주고 있습니다.','이 카드는 지금 당신이 서 있는 자리를 나타냅니다. 현재의 에너지와 도전을 보여줍니다.','이 카드는 앞으로의 방향을 제시합니다. 당신이 취할 수 있는 조언과 잠재적 결과입니다.'] },
      '5': { name:'오장 스프레드', label:'5-Card', cnt:5, header:'오장 스프레드 · 다섯 가지 시선', summary:'현재에서 미래까지, 도전과 잠재력을 포함한 폭넓은 시야를 제공합니다.', positions:['현재의 상황','당면한 도전','과거의 영향','다가올 미래','잠재적 결과'], descs:['당신이 지금 서 있는 위치와 현재의 에너지입니다.','당신이 극복해야 할 장애물이나 배워야 할 교훈입니다.','과거의 경험이 현재에 미치는 영향입니다.','곧 다가올 사건이나 만날 기회입니다.','현재의 흐름이 이끄는 최종 결과입니다.'] },
      '7': { name:'칠장 스프레드', label:'7-Card', cnt:7, header:'칠장 스프레드 · 일곱 가지 통찰', summary:'내면과 환경을 포함해 삶의 여러 차원을 종합적으로 탐색합니다.', positions:['현재의 중심','당면한 도전','과거의 영향','다가올 미래','자신의 내면','환경과 타인','최종 결과'], descs:['지금 당신의 삶의 중심에 있는 에너지입니다.','당신이 직면한 주요 도전과제입니다.','과거의 경험이 현재에 미치는 영향입니다.','곧 펼쳐질 가능성과 기회입니다.','당신의 내면 상태와 숨은 잠재력입니다.','주변 환경과 사람들의 영향입니다.','현재 흐름의 궁극적 결과입니다.'] },
      '10': { name:'십장 스프레드', label:'10-Card', cnt:10, header:'십장 스프레드 · 켈틱 십자가', summary:'가장 깊이 있는 분석. 목표, 잠재의식, 환경, 두려움까지 삶의 전반을 꿰뚫습니다.', positions:['현재의 상황','당면한 도전','과거의 기반','다가올 미래','의식적 목표','잠재의식의 영향','자신의 태도','환경과 타인','희망과 두려움','최종 결과'], descs:['지금 이 순간의 핵심 에너지입니다.','당신이 직면한 장애물이나 극복해야 할 문제입니다.','현재 상황을 만든 과거의 경험입니다.','가까운 미래에 펼쳐질 일들입니다.','당신이 의식적으로 추구하는 목표입니다.','무의식이 당신에게 주는 메시지입니다.','당신의 현재 태도와 접근 방식입니다.','당신을 둘러싼 환경과 사람들의 영향입니다.','당신의 희망, 두려움, 기대입니다.','이 모든 흐름이 이끄는 궁극적 결과입니다.'] }
    };

    let currentSpread = SPREADS['3'];
    let selected=[]; // [{deckIdx, reversed}]
    let _lastCardData = null;
    let _lastReading = null;
    let _lastQuestion = '';

    // ─── Spread selector ──────────────────────────────────────────────────
    const spreadBtns = document.getElementById('spreadBtns');
    const spreadNameDisplay = document.getElementById('spreadNameDisplay');
    const spreadNameHeader = document.getElementById('spreadNameHeader');
    const maxCount = document.getElementById('maxCount');


    Object.keys(SPREADS).forEach(key => {
      const s = SPREADS[key];
      const btn = document.createElement('button');
      btn.className = 'spread-btn' + (key === '3' ? ' active' : '');
      btn.innerHTML = `<span class="cnt">${s.cnt}</span>${s.name}`;
      btn.addEventListener('click', () => selectSpread(key, btn));
      spreadBtns.appendChild(btn);
    });

    function selectSpread(key, btn) {
      currentSpread = SPREADS[key];
      document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      spreadNameDisplay.innerHTML = currentSpread.name + ' <span class="summary">' + currentSpread.summary + '</span>';
      spreadNameHeader.textContent = currentSpread.name;
      maxCount.textContent = currentSpread.cnt;
      resetSelection();
    }

    // ─── Render deck ──────────────────────────────────────────────────────
    TAROT_DECK.forEach((card,idx)=>{
      const el=document.createElement('div');
      el.className='tarot-card';
      el.dataset.index=idx;
      el.innerHTML=`<div class="card-pattern"><div class="card-pattern-inner">✦</div></div><div class="sel-num"></div><div class="orient-badge"></div>`;
      el.addEventListener('click',()=>toggleSelect(el,idx));
      grid.appendChild(el);
    });

    function toggleSelect(el,idx){
      if(el.classList.contains('disabled')) return;
      if(el.classList.contains('selected')){
        el.classList.remove('selected');
        selected=selected.filter(s=>s.deckIdx!==idx);
      }else{
        if(selected.length>=currentSpread.cnt) return;
        const reversed=Math.random()<0.5;
        selected.push({deckIdx:idx,reversed});
        el.classList.add('selected');
        const badge=el.querySelector('.orient-badge');
        badge.textContent=reversed?'역방향 ↓':'정방향 ↑';
        badge.className='orient-badge '+(reversed?'orient-reversed':'orient-upright');
      }
      updateNumbers();
      updateUI();
    }

    function updateNumbers(){
      document.querySelectorAll('.tarot-card').forEach(card=>{
        const idx=parseInt(card.dataset.index);
        const found=selected.findIndex(s=>s.deckIdx===idx);
        card.querySelector('.sel-num').textContent=found!==-1?found+1:'';
      });
    }

    function updateUI(){
      selectedCount.textContent=selected.length;
      document.querySelectorAll('.tarot-card').forEach(card=>{
        const idx=parseInt(card.dataset.index);
        const isSel=selected.some(s=>s.deckIdx===idx);
        if(selected.length>=currentSpread.cnt && !isSel) card.classList.add('disabled');
        else card.classList.remove('disabled');
      });
      revealBtn.classList.toggle('visible',selected.length===currentSpread.cnt);
    }

    // ─── Event listeners ──────────────────────────────────────────────────
    revealBtn.addEventListener('click',revealCards);
    resultCloseBtn.addEventListener('click',autoDraw);
    resultRedrawBtn.addEventListener('click',()=>{ shuffleGrid(); resetSelection(); window.scrollTo({top:0,behavior:'smooth'}); });
    document.getElementById('resultCopyPromptBtn').addEventListener('click', copyPrompt);
    document.getElementById('resultAISummaryBtn').addEventListener('click', openAISummary);

    function buildAIPrompt() {
      if (!_lastCardData) return '';
      const hasQ = _lastQuestion && _lastQuestion !== '질문없음';
      let p = '';
      if (hasQ) p += `질문: "${_lastQuestion}"\n\n`;
      p += `타로 카드 리딩 결과를 분석해주세요.\n`;
      p += `스프레드: ${currentSpread.label} (${currentSpread.name})\n\n`;
      _lastCardData.forEach((d,i)=>{
        const c=d.card;
        const el = c.element || '메이저';
        p += `${i+1}. ${d.posName}: ${c.name} (${c.nameEn}) · ${d.reversed ? '역방향' : '정방향'} · ${el}\n`;
        p += `   ${d.reversed ? c.reversed : c.upright}\n\n`;
      });
      p += `위 카드들의 조합과 흐름을 종합적으로 해석해주세요.\n`;
      p += `차분하고 따뜻한 말투로 부드럽게 설명해주세요.`;
      return p;
    }

    function openAISummary() {
      if (!_lastCardData) return;
      const q = '타로 리딩 분석 ' + _lastCardData.map((d,i)=>`${i+1}.${d.card.name}`).join(' ');
      window.open('https://www.google.com/search?q=' + encodeURIComponent(q) + '&udm=50&source=hp', '_blank');
    }

    async function copyPrompt() {
      const text = buildAIPrompt();
      if (!text) return;
      try { await navigator.clipboard.writeText(text); } catch(e) {}
      const btn=document.getElementById('resultCopyPromptBtn');
      btn.textContent='✅ 복사됨';
      setTimeout(()=>{ btn.textContent='📋 프롬프트 복사'; },2000);
    }

    function shuffleGrid(){
      const cards=Array.from(grid.children);
      for(let i=cards.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [cards[i],cards[j]]=[cards[j],cards[i]];
      }
      cards.forEach(c=>grid.appendChild(c));
    }

    function autoDraw(){
      const indices=[];
      while(indices.length<currentSpread.cnt){
        const r=Math.floor(Math.random()*TAROT_DECK.length);
        if(!indices.includes(r)) indices.push(r);
      }
      selected=indices.map(idx=>({deckIdx:idx,reversed:Math.random()<0.5}));
      revealCards();
    }

    function getMeaning(card,reversed){
      return reversed?card.reversed:card.upright;
    }

    function generateReading(cards) {
      try {
      const revCount=cards.filter(c=>c.reversed).length;
      const majorCount=cards.filter(c=>c.card.type==='major').length;
      const suits=[...new Set(cards.map(c=>c.card.suit).filter(Boolean))];
      const elements=suits.map(s=>TAROT_SUITS[s]?.element).filter(Boolean);
      const elemCount={}; elements.forEach(e=>{ elemCount[e]=(elemCount[e]||0)+1; });
      const revRatio = revCount / cards.length;

      const allKeywords = cards.map(c => c.card.keywords || '').filter(Boolean);
      const kw = allKeywords.length > 0
        ? allKeywords.join(' · ')
        : cards.map(c => c.reversed ? c.card.name + '(역)' : c.card.name).join(', ');

      const title = majorCount >= cards.length/2 ? '강한 운명의 흐름'
        : revRatio >= 0.6 ? '내면의 성찰이 필요한 때'
        : suits.length === 1 ? '강력한 에너지의 집중'
        : '균형과 조화의 시간';

      let lines = [];

      // 1 — 키워드
      lines.push(`✨ 키워드: ${kw}`);

      // 2 — 메이저/마이너
      if (majorCount >= cards.length/2) lines.push(`메이저 ${majorCount}장 — 우주가 큰 메시지를 보내고 있습니다. 인생의 중요한 전환점일 수 있습니다.`);
      else if (majorCount === 0) lines.push(`모두 마이너 아르카나 — 일상의 변화와 성장에 집중하세요. 작은 움직임이 큰 변화를 만듭니다.`);
      else lines.push(`메이저 ${majorCount}장, 마이너 ${cards.length-majorCount}장 — 일상 속에 중요한 의미가 숨어 있습니다.`);

      // 3 — 역방향
      if (revRatio >= 0.6) lines.push(`역방향 ${revCount}장 — 내면의 갈등이나 저항이 있을 수 있습니다. 같은 카드의 정방향 의미를 되새겨 조정점을 찾아보세요.`);
      else if (revRatio === 0) lines.push(`모두 정방향 — 에너지 흐름이 막힘 없이 열려 있습니다. 지금은 움직이기에 좋은 때입니다.`);
      else lines.push(`역방향 ${revCount}장 — 특정 영역의 도전이나 재고가 필요합니다. 해당 카드의 위치를 주목하세요.`);

      // 4 — 원소
      if (suits.length === 1) {
        const s = TAROT_SUITS[suits[0]];
        lines.push(`전원 ${s.name}(${s.element}) 계열 — ${s.desc}와 관련된 주제에 에너지가 집중되어 있습니다.`);
      } else if (elements.length > 0) {
        const em = Object.entries(elemCount).map(([k,v])=>`${k} ${v}개`).join(', ');
        let extra = '';
        if (elemCount['불'] && elemCount['물']) extra = ' 불과 물 — 열정과 감정의 균형이 중요합니다.';
        else if (elemCount['불'] && elemCount['땅']) extra = ' 불과 땅 — 도전과 현실의 조화가 필요합니다.';
        else if (elemCount['공기'] && elemCount['물']) extra = ' 공기와 물 — 이성과 감정 사이의 균형을 찾으세요.';
        lines.push(`원소 분포 ${em}.${extra}`);
      } else {
        lines.push(`메이저 위주 — 정신적·운명적 에너지가 강하게 작용 중입니다.`);
      }

      const elemStr = Object.entries(elemCount).map(([k,v])=>`${k} ${v}개`).join(', ')||'—';
      const detail = `메이저 ${majorCount}장 · 역방향 ${revCount}장 · ${cards.length}장 · ${elemStr}`;
      return {title, text: lines.join('\n'), detail};
      } catch(e) { return {title:'리딩 오류', text:'카드를 다시 펼쳐주세요.', detail:''}; }
    }

    async function callServerReading(cardData, question) {}

    function setLoading(show) {}

    function setError(msg) {
      crError.textContent = msg;
      crError.classList.add('active');
    }

    function buildCardHtml(cardData) {
      resultCards.innerHTML = '';
      cardData.forEach((d, i) => {
        const c = d.card;
        const orientText = d.reversed ? '역방향' : '정방향';
        const orientClass = d.reversed ? 'orient-reversed-badge' : 'orient-upright-badge';
        const suitInfo = c.suit ? `${c.suitName} (${c.element})` : '메이저 아르카나';
        const meaning = getMeaning(c, d.reversed);

        const div = document.createElement('div');
        div.className = 'result-card' + (d.reversed ? ' result-reversed' : '');
        div.style.animationDelay = `${0.1 + i * 0.15}s`;
        div.innerHTML = `
          <div class="rc-pos">CARD ${i+1} · ${d.posName}</div>
          <span class="rc-icon">${c.symbol || '🃏'}</span>
          <div class="rc-name">${c.name}</div>
          <div class="rc-name-en">${c.nameEn}</div>
          <div class="rc-orient ${orientClass}">${orientText}</div>
          <div class="rc-type">${suitInfo}</div>
          <div class="rc-meaning">${meaning}</div>
          <div class="rc-pos-desc">${d.posDesc}</div>
        `;
        resultCards.appendChild(div);
      });
    }

    function revealCards() {
      if (selected.length !== currentSpread.cnt) return;
      try {
      const question = qInput.value.trim() || '질문없음';

      const cardData = selected.map((s, i) => {
        const card = TAROT_DECK[s.deckIdx];
        return { card, reversed: s.reversed, position: i, posName: currentSpread.positions[i], posDesc: currentSpread.descs[i] };
      });

      // 키워드 조합 리뷰 생성
      const reading = generateReading(cardData);

      resultQuestion.textContent = question;
      document.getElementById('resultSpreadLabel').textContent = currentSpread.label + ' · ' + currentSpread.name;
      resultCards.innerHTML = '';
      crError.classList.remove('active');

      crTitle.textContent = reading.title;
      crText.textContent = reading.text;
      crDetail.innerHTML = reading.detail;
      buildCardHtml(cardData);
      _lastCardData = cardData;
      _lastReading = reading;
      _lastQuestion = question;

      // Show overlay
      resultOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      } catch(e) {
        console.error('revealCards error', e);
        alert('카드 리딩 중 오류가 발생했습니다. 다시 시도해주세요.');
      }
    }

    function resetSelection(){
      resultOverlay.classList.remove('open');
      document.body.style.overflow='';
      selected=[];
      document.querySelectorAll('.tarot-card').forEach(card=>{
        card.classList.remove('selected','disabled');
        card.querySelector('.orient-badge').textContent='';
        card.querySelector('.orient-badge').className='orient-badge';
      });
      updateNumbers();
      updateUI();
    }

    resultOverlay.addEventListener('click',e=>{ if(e.target===resultOverlay) resetSelection(); });
    document.addEventListener('keydown',e=>{ if(e.key==='Escape') resetSelection(); });
  </script>
