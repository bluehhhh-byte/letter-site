<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>디지털 엽서 — 그리움이 닿는 곳</title>
  <link rel="stylesheet" href="../styles.css" />
  <script src="../oracle/poems.js"></script>
  <style>
    body { justify-content: flex-start; padding-top:5rem; }
    .pc-header {
      position:fixed; top:0; left:0; right:0; z-index:50;
      padding:.85rem 2rem;
      background:rgba(7,7,13,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .pc-header .back-link { color:var(--text-dim); text-decoration:none; font-family:var(--font-sans); font-size:.8rem; letter-spacing:.1em; transition:color .3s; }
    @media (hover:hover) { .pc-header .back-link:hover { color:var(--gold); } }
    .pc-header h1 { font-family:var(--font-serif); font-size:1rem; font-weight:300; color:var(--gold); letter-spacing:.15em; }
    .pc-body { position:relative; z-index:1; width:100%; max-width:560px; padding:1rem 1.5rem 8rem; display:flex; flex-direction:column; align-items:center; gap:1.2rem; }
    .pc-desc { font-family:var(--font-sans); font-size:.7rem; color:var(--text-dim); letter-spacing:.1em; text-align:center; line-height:1.8; }

    /* Postcard preview */
    .postcard-frame {
      position:relative; width:100%; max-width:440px;
      border:1px solid var(--border); background:var(--bg-card);
      overflow:hidden;
    }
    .postcard-frame::before {
      content:''; display:block; padding-bottom:133.33%;
    }
    .postcard {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:2.5rem 1.8rem;
      text-align:center;
    }
    .postcard .pc-stars {
      position:absolute; inset:0; pointer-events:none; overflow:hidden;
    }
    .postcard .pc-border {
      position:absolute; inset:8px;
      border:1px solid rgba(201,169,110,0.15);
      pointer-events:none;
    }
    .postcard .pc-corner {
      position:absolute; width:16px; height:16px;
      border-color:var(--gold-dim); border-style:solid;
      pointer-events:none;
    }
    .postcard .pc-corner.tl { top:14px; left:14px; border-width:1px 0 0 1px; }
    .postcard .pc-corner.tr { top:14px; right:14px; border-width:1px 1px 0 0; }
    .postcard .pc-corner.bl { bottom:14px; left:14px; border-width:0 0 1px 1px; }
    .postcard .pc-corner.br { bottom:14px; right:14px; border-width:0 1px 1px 0; }

    .postcard .pc-site {
      font-family:var(--font-sans); font-size:.55rem;
      letter-spacing:.25em; color:var(--gold-dim);
      margin-bottom:auto; padding-top:.5rem;
    }
    .postcard .pc-divider {
      width:40px; height:1px; background:rgba(201,169,110,0.25);
      margin:.8rem auto;
    }
    .postcard .pc-poem {
      font-family:var(--font-serif); font-size:.85rem;
      line-height:2; color:var(--text);
      font-weight:300; white-space:pre-line;
      flex:1; display:flex; align-items:center;
    }
    .postcard .pc-poem-inner {
      width:100%;
    }
    .postcard .pc-poem-inner .pc-line {
      display:block; opacity:0;
      animation:pcLineIn .5s ease forwards;
    }
    @keyframes pcLineIn {
      0% { opacity:0; transform:translateY(6px); }
      100% { opacity:1; transform:translateY(0); }
    }
    .postcard .pc-poem-inner .pc-line-break {
      display:block; height:.2rem;
    }
    .postcard .pc-date {
      font-family:var(--font-sans); font-size:.5rem;
      letter-spacing:.15em; color:var(--text-muted);
      margin-top:auto; padding-bottom:.5rem;
    }

    /* Controls */
    .pc-controls { display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center; width:100%; }
    .pc-btn {
      padding:.7rem 1.6rem; border:1px solid var(--border);
      background:var(--bg-card); color:var(--text);
      font-family:var(--font-sans); font-size:.75rem;
      letter-spacing:.1em; cursor:pointer; border-radius:4px;
      transition:all .3s; touch-action:manipulation;
    }
    @media (hover:hover) {
      .pc-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
    }
    .pc-btn:active { transform:scale(0.96); }
    .pc-btn.primary { background:rgba(201,169,110,0.1); border-color:rgba(201,169,110,0.3); color:var(--gold); }
    @media (hover:hover) { .pc-btn.primary:hover { background:rgba(201,169,110,0.2); } }

    .pc-toast {
      position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
      background:var(--bg-card); border:1px solid var(--border);
      padding:.6rem 1.5rem; font-family:var(--font-sans);
      font-size:.7rem; color:var(--gold); letter-spacing:.1em;
      z-index:100; opacity:0; transition:opacity .4s;
      pointer-events:none;
    }
    .pc-toast.show { opacity:1; }

    @media (max-width:480px) {
      body { padding-top:4rem; }
      .pc-body { padding:.5rem 1rem 8rem; gap:1rem; }
      .postcard { padding:1.8rem 1.2rem; }
      .postcard .pc-poem { font-size:.8rem; line-height:1.9; }
      .postcard .pc-site { font-size:.5rem; }
      .pc-btn { font-size:.7rem; padding:.6rem 1.2rem; }
    }
  </style>
</head>
<body>
  <header class="pc-header">
    <a href="../index.html" class="back-link">← 돌아가기</a>
    <h1>디지털 엽서</h1>
    <span></span>
  </header>

  <div class="stars" id="stars"></div>

  <nav class="mode-nav">
    <a href="../oracle/index.html" class="mode-btn">오라클</a>
    <a href="../tarot/index.html" class="mode-btn">타로</a>
    <a href="../comfort/index.html" class="mode-btn">처방전</a>
    <a href="../capsule/index.html" class="mode-btn">캡슐</a>
    <a href="../wish/index.html" class="mode-btn">별자리</a>
    <a href="../book/index.html" class="mode-btn">서재</a>
    <a href="../radio/index.html" class="mode-btn">라디오</a>
  </nav>

  <div class="pc-body">
    <p class="pc-desc">
      마음에 닿은 시 한 구절을<br/>
      엽서에 담아 간직하세요
    </p>

    <div class="postcard-frame" id="postcardFrame">
      <div class="postcard" id="postcard">
        <div class="pc-stars" id="pcStars"></div>
        <div class="pc-border"></div>
        <div class="pc-corner tl"></div>
        <div class="pc-corner tr"></div>
        <div class="pc-corner bl"></div>
        <div class="pc-corner br"></div>
        <div class="pc-site">그리움이 닿는 곳</div>
        <div class="pc-divider"></div>
        <div class="pc-poem">
          <div class="pc-poem-inner" id="pcPoemInner"></div>
        </div>
        <div class="pc-date" id="pcDate"></div>
      </div>
    </div>

    <div class="pc-controls">
      <button class="pc-btn" id="pcNew">새로운 엽서</button>
      <button class="pc-btn primary" id="pcDownload">이미지로 저장</button>
    </div>
  </div>

  <div class="pc-toast" id="pcToast">저장되었습니다</div>

  <div class="footer">그리움이 닿는 곳</div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const today = new Date();
    const dateStr = today.getFullYear() + '년 ' + (today.getMonth()+1) + '월 ' + today.getDate() + '일';

    function getRandomPoem() {
      return POEMS[Math.floor(Math.random() * POEMS.length)];
    }

    function renderPoem(text) {
      const container = document.getElementById('pcPoemInner');
      container.innerHTML = '';
      const lines = text.split('\n');
      lines.forEach((line, i) => {
        const span = document.createElement('span');
        span.className = 'pc-line';
        span.textContent = line || '\u00A0';
        span.style.animationDelay = (i * 0.1) + 's';
        container.appendChild(span);
        if (i < lines.length - 1) {
          const br = document.createElement('span');
          br.className = 'pc-line-break';
          container.appendChild(br);
        }
      });
    }

    function renderStars() {
      const s = document.getElementById('pcStars');
      s.innerHTML = '';
      for (let i = 0; i < 30; i++) {
        const d = document.createElement('div');
        d.className = 'star';
        d.style.left = Math.random() * 100 + '%';
        d.style.top = Math.random() * 100 + '%';
        d.style.setProperty('--d', (Math.random() * 4 + 3) + 's');
        d.style.animationDelay = Math.random() * 5 + 's';
        s.appendChild(d);
      }
    }

    function newPostcard(poemIdx) {
      document.getElementById('pcDate').textContent = dateStr;
      var text;
      if (poemIdx != null && poemIdx >= 0 && poemIdx < POEMS.length) {
        text = POEMS[poemIdx];
      } else {
        text = getRandomPoem();
      }
      renderPoem(text);
      renderStars();
    }

    function toast(msg) {
      const t = document.getElementById('pcToast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._hide);
      t._hide = setTimeout(() => t.classList.remove('show'), 2000);
    }

    document.getElementById('pcNew').addEventListener('click', function() { newPostcard(null); });

    document.getElementById('pcDownload').addEventListener('click', function() {
      const frame = document.getElementById('postcardFrame');
      const btn = this;
      btn.textContent = '저장 중...';
      btn.disabled = true;

      html2canvas(frame, {
        scale: 3,
        backgroundColor: '#12121a',
        useCORS: true,
        logging: false,
        width: frame.offsetWidth,
        height: frame.offsetHeight,
        onclone: function(doc) {
          const lines = doc.querySelectorAll('.pc-line');
          lines.forEach(l => { l.style.opacity = '1'; l.style.animation = 'none'; });
        }
      }).then(function(canvas) {
        const link = document.createElement('a');
        link.download = 'postcard-' + today.getFullYear() + 
          String(today.getMonth()+1).padStart(2,'0') + 
          String(today.getDate()).padStart(2,'0') + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        toast('이미지가 저장되었습니다');
      }).catch(function() {
        toast('저장에 실패했습니다. 다시 시도해 주세요.');
      }).finally(function() {
        btn.textContent = '이미지로 저장';
        btn.disabled = false;
      });
    });

    // Background stars
    (function(){
      const c=document.getElementById('stars');
      for(let i=0;i<40;i++){
        const s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        s.style.setProperty('--d',(Math.random()*4+3)+'s');
        s.style.animationDelay=Math.random()*5+'s'; c.appendChild(s);
      }
    })();

    var params = new URLSearchParams(window.location.search);
    var poemIdx = params.get('poem');
    newPostcard(poemIdx != null ? parseInt(poemIdx, 10) : null);
  </script>
</body>
</html>
