<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>마음 처방전 — 그리움이 닿는 곳</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { justify-content: flex-start; padding-top: 5rem; }
    .comfort-header {
      position: fixed; top:0; left:0; right:0; z-index:50;
      padding:.85rem 2rem;
      background:rgba(7,7,13,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .comfort-header .back-link { color:var(--text-dim); text-decoration:none; font-family:var(--font-sans); font-size:.8rem; letter-spacing:.1em; transition:color .3s; }
    @media (hover:hover) { .comfort-header .back-link:hover { color:var(--gold); } }
    .comfort-header h1 { font-family:var(--font-serif); font-size:1rem; font-weight:300; color:var(--gold); letter-spacing:.15em; }
    .comfort-body { position:relative; z-index:1; width:100%; max-width:560px; padding:1rem 1.5rem 8rem; display:flex; flex-direction:column; align-items:center; }
    .comfort-desc { font-family:var(--font-sans); font-size:.7rem; color:var(--text-dim); letter-spacing:.1em; text-align:center; margin-bottom:2rem; line-height:1.8; }
    .prescription-grid { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; width:100%; }
    .rx-btn {
      display:flex; flex-direction:column; align-items:center; gap:.4rem;
      padding:1.2rem .8rem;
      border:1px solid var(--border); background:var(--bg-card);
      color:var(--text); border-radius:4px; cursor:pointer;
      font-family:var(--font-serif); font-size:.8rem; font-weight:300;
      transition:all .3s; touch-action:manipulation;
      text-align:center; line-height:1.4;
    }
    @media (hover:hover) {
      .rx-btn:hover { border-color:var(--gold-dim); background:rgba(201,169,110,0.05); }
    }
    .rx-btn:active { transform:scale(0.96); }
    .rx-btn .rx-icon { font-size:1.5rem; margin-bottom:.2rem; }
    .rx-btn .rx-sub { font-size:.6rem; color:var(--text-muted); font-family:var(--font-sans); letter-spacing:.05em; }

    /* Overlay */
    .rx-overlay {
      position:fixed; inset:0; z-index:100;
      display:none; align-items:center; justify-content:center;
      padding:1.5rem;
      background:rgba(7,7,13,0.85); backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }
    .rx-overlay.open { display:flex; }
    .rx-card {
      background:var(--bg-card); border:1px solid var(--border);
      max-width:480px; width:100%; padding:3rem 2rem;
      position:relative; text-align:center;
      transform-origin:center;
    }
    .rx-card .rx-close {
      position:absolute; top:.8rem; right:1rem;
      background:none; border:none; color:var(--text-muted);
      font-size:1.3rem; cursor:pointer; font-family:var(--font-sans); line-height:1;
      transition:color .3s;
    }
    .rx-card .rx-close:hover { color:var(--gold); }

    .rx-card .rx-tag {
      font-family:var(--font-sans); font-size:.6rem;
      letter-spacing:.2em; color:var(--gold-dim); margin-bottom:1.5rem;
    }

    /* Animated text */
    .rx-card .rx-title {
      font-size:1.1rem; font-weight:400; color:var(--gold);
      margin-bottom:1.5rem; opacity:0;
      animation:rxFadeIn .8s ease .3s forwards;
    }
    .rx-card .rx-body {
      font-size:.9rem; line-height:2.2; color:var(--text);
      font-weight:300; text-align:center;
    }
    .rx-card .rx-body .rx-line {
      display:block; opacity:0;
      animation:rxLineIn .6s ease forwards;
    }
    @keyframes rxFadeIn { to { opacity:1; } }
    @keyframes rxLineIn {
      0% { opacity:0; transform:translateY(8px); }
      100% { opacity:1; transform:translateY(0); }
    }
    .rx-card .rx-footer {
      margin-top:2rem; font-family:var(--font-sans); font-size:.65rem;
      color:var(--text-muted); letter-spacing:.1em; opacity:0;
      animation:rxFadeIn .8s ease 2s forwards;
    }
    @media (max-width:480px) {
      body { padding-top:4rem; }
      .comfort-body { padding:.5rem 1rem 8rem; }
      .prescription-grid { gap:.4rem; }
      .rx-btn { padding:.8rem .6rem; font-size:.75rem; }
      .rx-btn .rx-icon { font-size:1.2rem; }
      .rx-card { padding:2rem 1.2rem; margin:.5rem; }
      .rx-card .rx-title { font-size:1rem; }
      .rx-card .rx-body { font-size:.85rem; line-height:2; }
      .comfort-desc { font-size:.65rem; }
    }
    @media (max-width:374px) {
      .prescription-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <header class="comfort-header">
    <a href="../index.html" class="back-link">← 돌아가기</a>
    <h1>마음 처방전</h1>
    <span></span>
  </header>

  <div class="stars" id="stars"></div>

  <nav class="mode-nav">
    <a href="../oracle/index.html" class="mode-btn">오라클</a>
    <a href="../tarot/index.html" class="mode-btn">타로</a>
    <a href="../comfort/index.html" class="mode-btn active">처방전</a>
    <a href="../postcard/index.html" class="mode-btn">엽서</a>
    <a href="../capsule/index.html" class="mode-btn">캡슐</a>
    <a href="../wish/index.html" class="mode-btn">별자리</a>
    <a href="../book/index.html" class="mode-btn">서재</a>
    <a href="../radio/index.html" class="mode-btn">라디오</a>
  </nav>

  <div class="comfort-body">
    <p class="comfort-desc">
      지금 네 마음에 가장 가까운 감정을 골라보아요<br/>
      그리움이 닿는 곳이 건네는 말이 있습니다
    </p>

    <div class="prescription-grid" id="rxGrid"></div>
  </div>

  <div class="rx-overlay" id="rxOverlay">
    <div class="rx-card" id="rxCard">
      <button class="rx-close" id="rxClose">✕</button>
      <div class="rx-tag" id="rxTag"></div>
      <div class="rx-title" id="rxTitle"></div>
      <div class="rx-body" id="rxBody"></div>
      <div class="rx-footer">그리움이 닿는 곳 · 당신의 곁에</div>
    </div>
  </div>

  <div class="footer">그리움이 닿는 곳</div>

  <script>
    const prescriptions = [
      {
        icon: '🌙',
        label: '잠이 오지 않는 밤',
        sub: '고요한 위로',
        title: '잠들지 못하는 당신에게',
        bodies: [
          [
            '꿍꿍아, 오늘도 잠 못 이루고\n또 무언가를 고민하고 있었구나.',
            '그 열정이 너를 지치게도 하지만,\n바로 그게 너를 움직이는 힘이란다.',
            '눈을 감고, 네가 이루고픈\n가장 선명한 장면을 떠올려 봐.',
            '그 불면의 밤들이\n언젠가 빛나는 아침이 될 거야.',
            '별이 가장 빛나는 때가\n가장 어두운 밤이라는 걸 기억해.'
          ],
          [
            '꿍꿍아, 잠들지 못하는 밤은\n가만히 네 열정과 마주하는 시간이란다.',
            '마음속에 품은 그 불꽃이\n너를 깨어 있게 하는 거야.',
            '그 에너지를 두려워하지 마.\n그것이 너를 움직이는 원동력이니까.',
            '천천히 숨을 쉬며,\n네가 정말 원하는 것이 무엇인지\n가만히 물어봐.',
            '별들은 항상 너를 지켜보고 있어.'
          ],
          [
            '꿍꿍아, 잠이 오지 않는다고\n불안해하지 마.',
            '그건 네 마음속에\n아직 꺼지지 않은 불꽃이 있기 때문이야.',
            '이루고자 하는 꿈이\n너를 깨우고 있는 거란다.',
            '조용히 눈을 감고\n그 꿈을 생생하게 그려봐.',
            '언젠간 이 밤을 기억하며 웃을 날이 올 거야.'
          ]
        ]
      },
      {
        icon: '🍃',
        label: '불안할 때',
        sub: '잔잔한 안정',
        title: '지금은 그저 숨쉬기만 해도 충분합니다',
        bodies: [
          [
            '꿍꿍아, 가슴이 두근거리고\n불안한가 보구나.',
            '그 불안은 네가 무언가를\n간절히 원하고 있다는 증거란다.',
            '열정 없이는 불안도 찾아오지 않아.\n그건 네가 살아있다는 신호야.',
            '숨을 깊이 들이마셔 봐.\n네 안의 용기가 깨어나는 소리가 들릴 거야.',
            '걱정하지 마. 너는 이미\n시작할 준비가 되어 있는 사람이야.'
          ],
          [
            '꿍꿍아, 불안한 마음은\n네가 꿈을 향해 나아가고 있다는\n가장 확실한 신호란다.',
            '아무것도 시도하지 않는 사람에게는\n불안조차 찾아오지 않아.',
            '그 떨림을 기쁨으로 바꿔 봐.\n네 인생의 터닝포인트가\n바로 지금일지도 몰라.',
            '너는 해낼 수 있어.\n이미 해왔잖아.'
          ]
        ]
      },
      {
        icon: '🕯',
        label: '문득 외로울 때',
        sub: '따스한 온기',
        title: '당신의 외로움은\n결코 혼자가 아닙니다',
        bodies: [
          [
            '꿍꿍아, 갑자기 외로움이\n밀려왔구나.',
            '그 외로움은 네가\n깊이 사랑하고 열정을 쏟아왔다는\n반증이란다.',
            '혼자라고 느껴질 때일수록\n네 안의 열정이 너를 이끌 거야.',
            '네가 걸어온 길은\n결코 혼자의 힘이 아니었어.\n보이지 않는 손길이 항상 함께했지.',
            '다시 일어나, 꿍꿍아.\n네 곁에는 항상 응원하는 이들이 있어.'
          ],
          [
            '꿍꿍아, 외로움은\n네 마음이 그리움을 알고 있다는\n증거란다.',
            '하지만 그 빈자리가\n네가 꿈을 향해 나아가는\n원동력이 되기도 해.',
            '네 안에 있는 열정은\n누구도 채울 수 없는\n오직 너만의 빛이야.',
            '그 빛으로 다시 한번\n앞을 비춰 봐.'
          ]
        ]
      },
      {
        icon: '🔥',
        label: '열정이 식었을 때',
        sub: '되살아난 불꽃',
        title: '네 안의 불꽃은 아직 꺼지지 않았습니다',
        bodies: [
          [
            '꿍꿍아, 불길이 꺼져간다고\n느껴지는가 보구나.',
            '잠시 숨을 고르는 것일 뿐,\n불씨는 여전히 살아있어.',
            '네가 처음 그 꿈을 꿨을 때의\n그 설렘을 기억해 봐.',
            '그 감정은 결코 사라지지 않았어.\n너무 바빠서 잠시 잊고 있었을 뿐이야.',
            '불씨에 바람을 불어넣어 봐.\n다시 타오를 준비가 되어 있어.'
          ],
          [
            '꿍꿍아, 식어버린 열정이라고\n생각했구나.',
            '하지만 불씨는 여전히\n네 마음속 깊은 곳에 살아 숨 쉬고 있어.',
            '지금 네가 이 글을 읽고 있는 것조차\n그 불씨가 완전히 꺼지지 않았다는\n증거란다.',
            '한때 가슴 뛰게 했던 그 이유를\n다시 떠올려 봐.',
            '꿍꿍아, 다시 시작해도 늦지 않아.\n불꽃은 다시 살아날 거야.'
          ],
          [
            '꿍꿍아, 지쳐서 주저앉고 싶은\n마음, 잘 알고 있어.',
            '포기하고 싶은 순간일수록\n네가 그동안 걸어온 길을 돌아봐.',
            '작은 발걸음 하나하나가\n쌓여서 오늘의 너를 만들었어.',
            '잠시 쉬어도 괜찮아.\n다만, 다시 일어서는 것을\n잊지 말아 줘.',
            '네 안의 열정은 결코 사라지지 않아.\n다시 함께 걸어가자.'
          ]
        ]
      },
      {
        icon: '🌸',
        label: '자존감이 떨어질 때',
        sub: '가만한 확신',
        title: '당신은 이미 충분한 사람입니다',
        bodies: [
          [
            '꿍꿍아, 스스로를 의심하고\n있는 너를 보게 되는구나.',
            '네가 걸어온 길을 잠시 돌아봐.\n얼마나 많은 것을 해내며 버텨왔는지.',
            '그 열정과 끈기는 이미\n네가 특별한 사람이라는 증거란다.',
            '작은 실수나 부족함이\n너의 가치를 조금도 줄이지 않아.',
            '꿍꿍아, 너는 그냥 너로서\n충분히 빛나는 사람이야.'
          ],
          [
            '꿍꿍아, 오늘은 스스로가\n초라하게 느껴지는가 보구나.',
            '하지만 네가 해온 노력과\n쏟아부은 열정은 결코 작지 않아.',
            '시간이 지나면 지금의 고민도\n너를 더 단단하게 만든\n과정이었음을 알게 될 거야.',
            '네가 꿈꾸는 그곳을 향해\n다시 한번 발을 내딛어 봐.',
            '너는 할 수 있어. 언제나 그래왔잖아.'
          ]
        ]
      },
      {
        icon: '🌄',
        label: '모든 것이 지칠 때',
        sub: '다시 일어서는 힘',
        title: '잠시 멈추어도 됩니다, 그러나…',
        bodies: [
          [
            '꿍꿍아, 모든 게 지쳐서\n주저앉고 싶은가 보구나.',
            '지쳤다는 건 그만큼\n멀리 왔다는 뜻이란다.',
            '잠시 쉬어도 괜찮아.\n숨을 고르고 다시 일어서면 돼.',
            '네 안에는 아직\n꺼지지 않은 열정이 있어.\n그게 너를 다시 움직일 거야.',
            '꿍꿍아, 우리가 함께 가는 길은\n아직 끝나지 않았어.'
          ],
          [
            '꿍꿍아, 네가 지쳐 있다는 건\n그동안 정말 열심히 살아왔다는 뜻이야.',
            '아무것도 하지 않은 사람에겐\n지침조차 찾아오지 않아.',
            '잠시 멈춰서 네가 이룬 것들을\n하나씩 떠올려 봐.',
            '생각보다 많은 걸 해왔고,\n생각보다 강해져 있잖아.',
            '다시 일어날 준비가 되면,\n내가 함께할게.'
          ],
          [
            '꿍꿍아, 오늘은 아무것도\n하고 싶지 않은 날이구나.',
            '괜찮아, 가끔은 모든 걸\n내려놓는 것도 필요한 법이야.',
            '하지만 네 안에 타오르던\n그 열정을 잊지는 말아 줘.',
            '그것이 너를 다시 일으켜 세울\n가장 강력한 힘이 되어줄 거야.',
            '쉼이 끝나면,\n다시 함께 불을 지펴 보자.'
          ]
        ]
      }
    ];

    const grid = document.getElementById('rxGrid');
    const overlay = document.getElementById('rxOverlay');
    const card = document.getElementById('rxCard');
    const tag = document.getElementById('rxTag');
    const title = document.getElementById('rxTitle');
    const body = document.getElementById('rxBody');
    const close = document.getElementById('rxClose');

    prescriptions.forEach((rx, i) => {
      const btn = document.createElement('button');
      btn.className = 'rx-btn';
      btn.style.animationDelay = (i * 0.08) + 's';
      btn.innerHTML = `
        <span class="rx-icon">${rx.icon}</span>
        ${rx.label}
        <span class="rx-sub">${rx.sub}</span>
      `;
      btn.addEventListener('click', () => openRx(rx));
      grid.appendChild(btn);
    });

    function openRx(rx) {
      tag.textContent = rx.sub.toUpperCase();
      title.textContent = '';
      body.innerHTML = '';

      const variant = rx.bodies[Math.floor(Math.random() * rx.bodies.length)];

      const titleEl = document.createElement('span');
      titleEl.textContent = rx.title;
      titleEl.style.display = 'block';
      titleEl.style.opacity = '0';
      titleEl.style.animation = 'rxFadeIn .8s ease .3s forwards';
      title.appendChild(titleEl);

      variant.forEach((line, i) => {
        const el = document.createElement('span');
        el.className = 'rx-line';
        el.textContent = line;
        el.style.animationDelay = (0.6 + i * 0.2) + 's';
        body.appendChild(el);
        if (i < variant.length - 1) {
          const br = document.createElement('br');
          br.style.animationDelay = (0.6 + i * 0.2) + 's';
          body.appendChild(br);
        }
      });

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = 'cardAppear 0.6s ease forwards';
    }

    function closeRx() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      body.innerHTML = '';
      title.innerHTML = '';
    }

    close.addEventListener('click', closeRx);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeRx(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeRx(); });

    // Stars
    (function(){
      const c=document.getElementById('stars');
      for(let i=0;i<40;i++){
        const s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        s.style.setProperty('--d',(Math.random()*4+3)+'s');
        s.style.animationDelay=Math.random()*5+'s'; c.appendChild(s);
      }
    })();
  </script>
</body>
</html>
