  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { justify-content: flex-start; padding-top: 5rem; }
    .comfort-header {
      position: fixed; top:0; left:0; right:0; z-index:50;
      padding:.85rem 2rem;
      background:rgba(7,7,13,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .comfort-header .back-link { color:var(--text-dim); text-decoration:none; font-family:var(--font-sans); font-size:.8rem; letter-spacing:.1em; transition:color .3s; }
    @media (hover:hover) { .comfort-header .back-link:hover { color:var(--gold); } }
    .comfort-header h1 { font-family:var(--font-serif); font-size:1rem; font-weight:300; color:var(--gold); letter-spacing:.15em; }
    .comfort-body { position:relative; z-index:1; width:100%; max-width:560px; padding:1rem 1.5rem 8rem; display:flex; flex-direction:column; align-items:center; }
    .comfort-desc { font-family:var(--font-sans); font-size:.7rem; color:var(--text-dim); letter-spacing:.1em; text-align:center; margin-bottom:2rem; line-height:1.8; }
    .prescription-grid { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; width:100%; }
    .rx-btn {
      display:flex; flex-direction:column; align-items:center; gap:.4rem;
      padding:1.2rem .8rem;
      border:1px solid var(--border); background:var(--bg-card);
      color:var(--text); border-radius:4px; cursor:pointer;
      font-family:var(--font-serif); font-size:.8rem; font-weight:300;
      transition:all .3s; touch-action:manipulation;
      text-align:center; line-height:1.4;
    }
    @media (hover:hover) {
      .rx-btn:hover { border-color:var(--gold-dim); background:rgba(201,169,110,0.05); }
    }
    .rx-btn:active { transform:scale(0.96); }
    .rx-btn .rx-icon { font-size:1.5rem; margin-bottom:.2rem; }
    .rx-btn .rx-sub { font-size:.6rem; color:var(--text-muted); font-family:var(--font-sans); letter-spacing:.05em; }

    /* Overlay */
    .rx-overlay {
      position:fixed; inset:0; z-index:100;
      display:none; align-items:center; justify-content:center;
      padding:1.5rem;
      background:rgba(7,7,13,0.85); backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }
    .rx-overlay.open { display:flex; }
    .rx-card {
      background:var(--bg-card); border:1px solid var(--border);
      max-width:480px; width:100%; padding:3rem 2rem;
      position:relative; text-align:center;
      transform-origin:center;
    }
    .rx-card .rx-close {
      position:absolute; top:.8rem; right:1rem;
      background:none; border:none; color:var(--text-muted);
      font-size:1.3rem; cursor:pointer; font-family:var(--font-sans); line-height:1;
      transition:color .3s;
    }
    .rx-card .rx-close:hover { color:var(--gold); }

    .rx-card .rx-tag {
      font-family:var(--font-sans); font-size:.6rem;
      letter-spacing:.2em; color:var(--gold-dim); margin-bottom:1.5rem;
    }

    /* Animated text */
    .rx-card .rx-title {
      font-size:1.1rem; font-weight:400; color:var(--gold);
      margin-bottom:1.5rem; opacity:0;
      animation:rxFadeIn .8s ease .3s forwards;
    }
    .rx-card .rx-body {
      font-size:.9rem; line-height:2; color:var(--text);
      font-weight:300; text-align:left;
    }
    .rx-card .rx-body .rx-paragraph {
      margin-bottom:1.2rem; opacity:0;
      animation:rxFadeUp .6s ease forwards;
      word-break:keep-all;
    }
    .rx-card .rx-body .rx-paragraph:last-child { margin-bottom:0; }
    @keyframes rxFadeIn { to { opacity:1; } }
    @keyframes rxFadeUp {
      0% { opacity:0; transform:translateY(10px); }
      100% { opacity:1; transform:translateY(0); }
    }
    .rx-card .rx-footer {
      margin-top:2rem; font-family:var(--font-sans); font-size:.65rem;
      color:var(--text-muted); letter-spacing:.1em; opacity:0;
      animation:rxFadeIn .8s ease 2s forwards;
    }
    @media (max-width:480px) {
      body { padding-top:4rem; }
      .comfort-body { padding:.5rem 1rem 8rem; }
      .prescription-grid { gap:.4rem; }
      .rx-btn { padding:.8rem .6rem; font-size:.75rem; }
      .rx-btn .rx-icon { font-size:1.2rem; }
      .rx-card { padding:2rem 1.2rem; margin:.5rem; }
      .rx-card .rx-title { font-size:1rem; }
      .rx-card .rx-body { font-size:.85rem; line-height:1.9; text-align:left; }
      .rx-card .rx-body .rx-paragraph { margin-bottom:1rem; }
      .comfort-desc { font-size:.65rem; }
    }
    @media (max-width:374px) {
      .prescription-grid { grid-template-columns:1fr; }
    }
  </style>
</head>

        icon: '🌄', label: '모든 것이 지칠 때', sub: '다시 일어서는 힘',
        title: '잠시 멈추어도 됩니다, 그러나…',
        paras: [
          [
            '꿍꿍아, 모든 게 지쳐서 주저앉고 싶은가 보구나. 지쳤다는 건 그만큼 멀리 왔다는 뜻이란다. 잠시 쉬어도 괜찮아. 숨을 고르고 다시 일어서면 돼.',
            '꿍꿍아, 네가 지쳐 있다는 건 그동안 정말 열심히 살아왔다는 뜻이야. 아무것도 하지 않은 사람에겐 지침조차 찾아오지 않아.',
            '꿍꿍아, 오늘은 아무것도 하고 싶지 않은 날이구나. 괜찮아, 가끔은 모든 걸 내려놓는 것도 필요한 법이야.'
          ],
          [
            '네 안에는 아직 꺼지지 않은 열정이 있어. 그게 너를 다시 움직일 거야. 꿍꿍아, 우리가 함께 가는 길은 아직 끝나지 않았어.',
            '잠시 멈춰서 네가 이룬 것들을 하나씩 떠올려 봐. 생각보다 많은 걸 해왔고, 생각보다 강해져 있잖아. 다시 일어날 준비가 되면, 내가 함께할게.',
            '하지만 네 안에 타오르던 그 열정을 잊지는 말아 줘. 그것이 너를 다시 일으켜 세울 가장 강력한 힘이 되어줄 거야. 쉼이 끝나면, 다시 함께 불을 지펴 보자.'
          ],
          [
            '지침은 끝이 아니라 새로운 시작을 위한 준비 과정이란다. 충분히 쉰 후에는 다시 일어설 힘이 생길 거야.',
            '꿍꿍아, 지금 이 순간도 지나가면 추억이 될 거야. 그리고 그 추억은 너를 더 단단하게 만들어 줄 거야.',
            '가장 어두운 밤이 지나면 가장 밝은 아침이 오는 법이야. 꿍꿍아, 조금만 더 힘을 내 봐. 곧 새로운 날이 밝아올 거야.'
          ]
        ]
      }
    ];

    const grid = document.getElementById('rxGrid');
    const overlay = document.getElementById('rxOverlay');
    const card = document.getElementById('rxCard');
    const tag = document.getElementById('rxTag');
    const title = document.getElementById('rxTitle');
    const body = document.getElementById('rxBody');
    const close = document.getElementById('rxClose');

    prescriptionData.forEach((rx, i) => {
      const btn = document.createElement('button');
      btn.className = 'rx-btn';
      btn.style.animationDelay = (i * 0.08) + 's';
      btn.innerHTML = `
        <span class="rx-icon">${rx.icon}</span>
        ${rx.label}
        <span class="rx-sub">${rx.sub}</span>
      `;
      btn.addEventListener('click', () => openRx(rx));
      grid.appendChild(btn);
    });

    function openRx(rx) {
      tag.textContent = rx.sub.toUpperCase();
      title.textContent = '';
      body.innerHTML = '';

      const titleEl = document.createElement('span');
      titleEl.textContent = rx.title;
      titleEl.style.display = 'block';
      titleEl.style.opacity = '0';
      titleEl.style.animation = 'rxFadeIn .8s ease .3s forwards';
      title.appendChild(titleEl);

      rx.paras.forEach((pool, i) => {
        const p = document.createElement('p');
        p.className = 'rx-paragraph';
        p.textContent = pick(pool);
        p.style.animationDelay = (0.5 + i * 0.25) + 's';
        body.appendChild(p);
      });

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = 'cardAppear 0.6s ease forwards';
    }

    function closeRx() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      body.innerHTML = '';
      title.innerHTML = '';
    }

    close.addEventListener('click', closeRx);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeRx(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeRx(); });

    // Stars
    (function(){
      const c=document.getElementById('stars');
      for(let i=0;i<40;i++){
        const s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        s.style.setProperty('--d',(Math.random()*4+3)+'s');
        s.style.animationDelay=Math.random()*5+'s'; c.appendChild(s);
      }
    })();
  </script>
</body>
</html>
