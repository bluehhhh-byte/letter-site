  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { justify-content: flex-start; padding-top: 5rem; }
    .comfort-header {
      position: fixed; top:0; left:0; right:0; z-index:50;
      padding:.85rem 2rem;
      background:rgba(7,7,13,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .comfort-header .back-link { color:var(--text-dim); text-decoration:none; font-family:var(--font-sans); font-size:.8rem; letter-spacing:.1em; transition:color .3s; }
    @media (hover:hover) { .comfort-header .back-link:hover { color:var(--gold); } }
    .comfort-header h1 { font-family:var(--font-serif); font-size:1rem; font-weight:300; color:var(--gold); letter-spacing:.15em; }
    .comfort-body { position:relative; z-index:1; width:100%; max-width:560px; padding:1rem 1.5rem 8rem; display:flex; flex-direction:column; align-items:center; }
    .comfort-desc { font-family:var(--font-sans); font-size:.7rem; color:var(--text-dim); letter-spacing:.1em; text-align:center; margin-bottom:2rem; line-height:1.8; }
    .prescription-grid { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; width:100%; }
    .rx-btn {
      display:flex; flex-direction:column; align-items:center; gap:.4rem;
      padding:1.2rem .8rem;
      border:1px solid var(--border); background:var(--bg-card);
      color:var(--text); border-radius:4px; cursor:pointer;
      font-family:var(--font-serif); font-size:.8rem; font-weight:300;
      transition:all .3s; touch-action:manipulation;
      text-align:center; line-height:1.4;
    }
    @media (hover:hover) {
      .rx-btn:hover { border-color:var(--gold-dim); background:rgba(201,169,110,0.05); }
    }
    .rx-btn:active { transform:scale(0.96); }
    .rx-btn .rx-icon { font-size:1.5rem; margin-bottom:.2rem; }
    .rx-btn .rx-sub { font-size:.6rem; color:var(--text-muted); font-family:var(--font-sans); letter-spacing:.05em; }

    /* Overlay */
    .rx-overlay {
      position:fixed; inset:0; z-index:100;
      display:none; align-items:center; justify-content:center;
      padding:1.5rem;
      background:rgba(7,7,13,0.85); backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }
    .rx-overlay.open { display:flex; }
    .rx-card {
      background:var(--bg-card); border:1px solid var(--border);
      max-width:480px; width:100%; padding:3rem 2rem;
      position:relative; text-align:center;
      transform-origin:center;
    }
    .rx-card .rx-close {
      position:absolute; top:.8rem; right:1rem;
      background:none; border:none; color:var(--text-muted);
      font-size:1.3rem; cursor:pointer; font-family:var(--font-sans); line-height:1;
      transition:color .3s;
    }
    .rx-card .rx-close:hover { color:var(--gold); }

    .rx-card .rx-tag {
      font-family:var(--font-sans); font-size:.6rem;
      letter-spacing:.2em; color:var(--gold-dim); margin-bottom:1.5rem;
    }

    /* Animated text */
    .rx-card .rx-title {
      font-size:1.1rem; font-weight:400; color:var(--gold);
      margin-bottom:1.5rem; opacity:0;
      animation:rxFadeIn .8s ease .3s forwards;
    }
    .rx-card .rx-body {
      font-size:.9rem; line-height:2; color:var(--text);
      font-weight:300; text-align:left;
    }
    .rx-card .rx-body .rx-paragraph {
      margin-bottom:1.2rem; opacity:0;
      animation:rxFadeUp .6s ease forwards;
      word-break:keep-all;
    }
    .rx-card .rx-body .rx-paragraph:last-child { margin-bottom:0; }
    @keyframes rxFadeIn { to { opacity:1; } }
    @keyframes rxFadeUp {
      0% { opacity:0; transform:translateY(10px); }
      100% { opacity:1; transform:translateY(0); }
    }
    .rx-card .rx-footer {
      margin-top:2rem; font-family:var(--font-sans); font-size:.65rem;
      color:var(--text-muted); letter-spacing:.1em; opacity:0;
      animation:rxFadeIn .8s ease 2s forwards;
    }
    @media (max-width:480px) {
      body { padding-top:4rem; }
      .comfort-body { padding:.5rem 1rem 8rem; }
      .prescription-grid { gap:.4rem; }
      .rx-btn { padding:.8rem .6rem; font-size:.75rem; }
      .rx-btn .rx-icon { font-size:1.2rem; }
      .rx-card { padding:2rem 1.2rem; margin:.5rem; }
      .rx-card .rx-title { font-size:1rem; }
      .rx-card .rx-body { font-size:.85rem; line-height:1.9; text-align:left; }
      .rx-card .rx-body .rx-paragraph { margin-bottom:1rem; }
      .comfort-desc { font-size:.65rem; }
    }
    @media (max-width:374px) {
      .prescription-grid { grid-template-columns:1fr; }
    }
  </style>
</head>

        paras: [

    const STORIES = [
      {
        paras: [
          `퐁퐁아야, 내가 얼마 전에 진짜 마음이 몽글몽글해지는 글을 하나 읽었는데, 너랑 꼭 나누고 싶어서.`,
          `너 '펄 벅'이라는 미국 작가 알지? 소설 <대지>로 노벨 문학상까지 받았던 엄청 대단한 할머니 작가 있잖아. 그분이 1960년에 처음으로 한국에 왔었대.`,
          `하루는 경주를 지나가고 있었는데, 해질 무렵에 한 농부 아저씨가 소달구지를 끌고 집으로 돌아가는 모습을 보게 된 거야. 근데 그 모습이 되게 희한했대. 달구지에도 볏단이 가득 실려 있는데, 아저씨도 등에 무거운 지게를 지고 볏단을 따로 멘 채 땀을 흘리며 걸어가고 있더라는 거지.`,
          `서양인 시선에서는 그게 도무지 이해가 안 가잖아. '아니, 저 무거운 짐을 다 소달구지에 실어버리고, 자기도 달구지에 올라타서 편하게 가면 될 텐데 왜 저러고 사서 고생을 할까?' 싶었던 거지. 그래서 궁금증을 못 참고 아저씨한테 가서 물어봤대.`,
          `"아저씨, 왜 소달구지를 안 타고 그렇게 힘들게 지게까지 지고 걸어가세요?"`,
          `그랬더니 그 농부 아저씨가 무심한 듯 툭 던진 말이 진짜 대박이야.`,
          `"에이! 어떻게 타고 갑니까. 저도 하루 종일 일했지만, 우리 소도 하루 종일 일했는데요. 그러니 짐도 이렇게 나누어서 지고 가야지요."`,
          `퐁퐁아야, 난 이 구절 읽는데 소름이 돋더라. 아저씨한테 그 소는 그냥 일 시키는 가축이나 재산이 아니라, 오늘 하루 같이 고생한 '동반자'였던 거야.`,
          `펄 벅 여사가 고국으로 돌아가서 "내 평생 세상에서 본 가장 아름다운 풍경이었다"라고 기록했대. 서양 농부라면 당연히 효율을 따져서 소한테 다 싣고 자기는 편하게 갔을 텐데, 소의 짐을 덜어주려고 자기 어깨에 무거운 지게를 지고 소랑 나란히 걷는 그 모습에 온몸에 전율이 일 만큼 큰 감동을 받은 거지.`,
          `그것 말고도 또 있어. 길을 가다가 늦가을 감나무 끝에 빨간 감 몇 개가 남겨져 있는 걸 보고 "저건 따기 힘들어서 그냥 둔 건가요?" 하고 물었더니, 동네 사람들이 "겨울에 배고플 새들을 위해 남겨둔 '까치밥'입니다" 하더래.`,
          `여사가 그 말을 듣고 또 울컥해서 "내가 한국에서 본 그 어떤 화려한 유적지나 왕릉보다, 이 감나무 하나를 본 것만으로도 한국에 오길 정말 잘했다"고 썼대.`,
          `생각해보면 우리 선조들은 참 다정했어. 봄에 씨앗을 심을 때도 꼭 세 알씩 심었잖아. 한 알은 하늘을 나는 새들 먹으라고, 한 알은 땅속 벌레들 먹으라고, 그리고 마지막 한 알만 우리가 먹으려고.`,
          `내가 조금 손해 보더라도, 내가 조금 더 힘들더라도 자연과 동물, 내 주변의 생명들이 굶지 않게 곁을 내어주는 마음. 퐁퐁아, 나는 이 이야기를 보면서 '이런 깊고 넓은 배려야말로 진정한 사랑의 태도가 아니었을까' 하는 생각이 들더라고.`,
          `요즘 세상은 '누가 더 이득인가', '어떻게 해야 효율적인가'만 따지느라 주변을 돌아볼 여유가 없잖아. 근데 아주 오래전 우리 선조들은 온 몸과 삶으로 진짜 사랑을 실천하고 있었던 거지.`,
          `우리가 대단한 건 못 하더라도, 일상에서 만나는 소소한 인연들이나 작은 생명들에게 이런 '사랑의 태도'를 조금씩이나마 닮아가면 참 좋겠다는 생각이 들어서 네 생각이 났어. 어때, 듣고 나니까 마음이 좀 따뜻해지지 않아?`
        ]
      },
      {
        paras: [
          `1장: 지퍼, 지독한 외로움의 끝에서 피어난 집착`,
          `인류의 역사에는 수많은 위대한 발명이 있지만, 오늘날 우리 옷에 달린 지퍼만큼 한 남자의 지독한 사랑과 외로움이 촘촘히 새겨진 물건은 없을 것입니다.`,
          `이야기는 1906년, 스웨덴에서 미국으로 건너온 26살의 젊은 전기공학자 기드온 선드벡에게서 시작됩니다. 사실 그가 지퍼를 만들던 회사에 입사한 이유는 거창한 미래나 기술에 대한 관심 때문이 아니었습니다. 그곳에서 만난 공장장의 딸, 엘비라 아론스에게 첫눈에 반했기 때문이었죠.`,
          `그는 오직 사랑하는 엘비라의 곁에 머물기 위해 매일 공장으로 출근했고, 마침내 뜨거운 열애 끝에 그녀와 결혼하는 데 성공합니다.`,
          `그러나 운명은 잔인했습니다. 행복도 잠시, 아이를 낳고 얼마 지나지 않아 아내 엘비라가 세상을 떠나고 만 것입니다. 세상 전부를 잃은 선드벡에게 남은 것은 가누지 못할 슬픔과 텅 빈 방안을 채우는 지독한 외로움뿐이었습니다.`,
          `그 밤낮 없는 외로움을 달래기 위해, 그는 매일 작업대 앞에 홀로 앉았습니다. 슬픔을 쏟아부을 곳이 오직 그 작은 작업대밖에 없었으니까요. 선드벡은 아내를 향한 그리움을 메우듯, 기존의 허술했던 발명품을 전부 뜯어내고 처음부터 다시 만들기 시작했습니다.`,
          `느슨했던 이빨 간격을 기존보다 2.5배나 더 촘촘하게 바꾸고, 양쪽 이빨이 한 치의 오차도 없이 단단하게 맞물리도록 설계했습니다. 그리고 이를 한 번에 끌어올리는 손잡이를 달았죠.`,
          `1917년, 그렇게 탄생한 것이 오늘날 우리가 쓰는 지퍼의 원형인 '분리형 잠금장치'였습니다. 오직 한 사람을 사랑해서 시작된 일이, 그 사람을 잃은 지독한 외로움을 견뎌내려다 완성된 것입니다. 지퍼의 촘촘한 이빨들은 사실 선드벡이 외로움과 싸우며 메워간 그리움의 간격이었습니다.`,
          `2장: 우연히 스르륵 열려버린 틈새`,
          `그런데 꿍꿍이 너를 만나고 지퍼의 이야기를 다시 읽다가, 문득 깨달은 게 있어. 선드벡이 그 지독한 외로움 속에서 지퍼의 이빨을 아무리 촘촘하고 단단하게 맞물려 놓았어도, 결국 애초에 올려두지 않으면 아무 소용이 없다는 사실을 말이야.`,
          `지난번 내가 네 앞에 섰을 때, 인류의 위대한 천재가 그토록 촘촘하게 메워두었던 내 바지의 지퍼가 의도치 않게 스르륵 열려 있었잖아.`,
          `1937년 패션지 에스콰이어 광고에서는 지퍼를 두고 "의도치 않게 벌어지는 당혹스러운 사고를 방지해 준다"고 호언장담했다는데, 그 역사적인 호언장담이 네 앞에서 실시간으로 무너져 내린 거지.`,
          `그때 내 지퍼가 열려 있는 걸 발견하고 네가 당황하면서도 쿡쿡 웃어주었을 때, 난 얼굴이 홍당무가 되면서도 이상하게 마음 한구석이 찌릿했어. 선드벡이 외로움을 잊으려고 그토록 단단하게 채워두었던 금속 장치가, 정작 내가 가장 좋아하는 네 앞에서는 너무나 무력하고 우연하게 풀려버렸다는 게 참 아이러니하면서도 웃음이 나더라고.`,
          `3장: 사실 지퍼는 '그리움의 도구'였어`,
          `요즘도 나는 옷을 입다가 지퍼 손잡이를 잡을 때마다 문득문득 그날의 네 웃음소리가 생각나.`,
          `세상은 지퍼를 보며 '완벽하게 닫아걸어야 하는 단정함'을 말하지만, 나한테 지퍼는 이제 전혀 다른 의미야. 선드벡이 슬픔 속에서 지퍼를 만들며 아내를 그리워했듯, 나 역시 이제는 지퍼를 올릴 때마다 너를 생각해.`,
          `단단하게 채워져 있던 내 일상의 방어벽이 너라는 사람 앞에서 부주의하게 스르륵 풀려버렸던 그 민망하고도 다정했던 순간. 그래서 내게 지퍼는 더 이상 차가운 금속 잠금장치가 아니라, 너와 함께 배를 잡고 웃던 그 하루를 고스란히 불러오는 '그리움의 도구'가 된 셈이지.`,
          `결국 지퍼는 사랑으로 시작해서 그리움으로 완성된 물건이 맞는 것 같아. 선드벡에게도, 그리고 지금의 나에게도.`
        ]
      }
    ];

    const grid = document.getElementById('rxGrid');
    const overlay = document.getElementById('rxOverlay');
    const card = document.getElementById('rxCard');
    const tag = document.getElementById('rxTag');
    const title = document.getElementById('rxTitle');
    const body = document.getElementById('rxBody');
    const close = document.getElementById('rxClose');

    prescriptionData.forEach((rx, i) => {
      const btn = document.createElement('button');
      btn.className = 'rx-btn';
      btn.style.animationDelay = (i * 0.08) + 's';
      btn.innerHTML = `
        <span class="rx-icon">${rx.icon}</span>
        ${rx.label}
        <span class="rx-sub">${rx.sub}</span>
      `;
      btn.addEventListener('click', () => openRx(rx));
      grid.appendChild(btn);
    });

    var storyBtn = document.createElement('button');
    storyBtn.className = 'rx-btn';
    storyBtn.innerHTML = '<span class="rx-icon">📜</span>꿍꿍이의 이야기<span class="rx-sub">퐁퐁이에게</span>';
    storyBtn.addEventListener('click', function() {
      var story = STORIES[Math.floor(Math.random() * STORIES.length)];
      tag.textContent = '퐁퐁이에게';
      title.innerHTML = '<span style="display:block;opacity:0;animation:rxFadeIn .8s ease .3s forwards">꿍꿍이의 이야기</span>';
      body.innerHTML = '';
      story.paras.forEach(function(p, i) {
        var el = document.createElement('p');
        el.className = 'rx-paragraph';
        el.textContent = p;
        el.style.animationDelay = (0.5 + i * 0.08) + 's';
        body.appendChild(el);
      });
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = 'cardAppear 0.6s ease forwards';
    });
    grid.appendChild(storyBtn);

    function openRx(rx) {
      tag.textContent = rx.sub.toUpperCase();
      title.textContent = '';
      body.innerHTML = '';

      const titleEl = document.createElement('span');
      titleEl.textContent = rx.title;
      titleEl.style.display = 'block';
      titleEl.style.opacity = '0';
      titleEl.style.animation = 'rxFadeIn .8s ease .3s forwards';
      title.appendChild(titleEl);

      rx.paras.forEach((pool, i) => {
        const p = document.createElement('p');
        p.className = 'rx-paragraph';
        p.textContent = pick(pool);
        p.style.animationDelay = (0.5 + i * 0.25) + 's';
        body.appendChild(p);
      });

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = 'cardAppear 0.6s ease forwards';
    }

    function closeRx() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      body.innerHTML = '';
      title.innerHTML = '';
    }

    close.addEventListener('click', closeRx);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeRx(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeRx(); });

    // Stars
    (function(){
      const c=document.getElementById('stars');
      for(let i=0;i<40;i++){
        const s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        s.style.setProperty('--d',(Math.random()*4+3)+'s');
        s.style.animationDelay=Math.random()*5+'s'; c.appendChild(s);
      }
    })();
  </script>
</body>
</html>
