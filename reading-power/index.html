<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>독서의 힘 — 그리움이 닿는 곳</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { justify-content: flex-start; padding-top:5rem; }
    .rp-header {
      position:fixed; top:0; left:0; right:0; z-index:50;
      padding:.85rem 2rem;
      background:rgba(7,7,13,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .rp-header .back-link { color:var(--text-dim); text-decoration:none; font-family:var(--font-sans); font-size:.8rem; letter-spacing:.1em; transition:color .3s; }
    @media (hover:hover) { .rp-header .back-link:hover { color:var(--gold); } }
    .rp-header h1 { font-family:var(--font-serif); font-size:1rem; font-weight:300; color:var(--gold); letter-spacing:.15em; }
    .rp-body { position:relative; z-index:1; width:100%; max-width:640px; padding:1rem 1.5rem 8rem; display:flex; flex-direction:column; align-items:center; }
    .rp-narrative {
      font-family:var(--font-serif); font-size:.85rem; line-height:2;
      color:var(--text-dim); text-align:center; font-weight:300;
      padding:1.5rem 1.2rem; border:1px solid var(--border);
      background:var(--bg-card); max-width:480px; margin-bottom:2rem;
    }
    .rp-narrative em { font-style:normal; color:var(--gold); }
    .rp-grid {
      display:grid; grid-template-columns:1fr; gap:.8rem;
      width:100%; max-width:520px;
    }
    .rp-card {
      display:flex; align-items:center; gap:1rem;
      border:1px solid var(--border); background:var(--bg-card);
      padding:1rem 1.2rem;
      transition:all .3s; touch-action:manipulation;
      text-decoration:none; color:var(--text); text-align:left;
      animation:rpFadeIn .5s ease forwards; opacity:0;
      border-left:2px solid var(--gold-dim);
    }
    .rp-card .rp-icon {
      font-size:1.2rem; flex-shrink:0; opacity:0.6;
    }
    .rp-card .rp-title {
      font-family:var(--font-serif); font-size:.9rem;
      font-weight:400; color:var(--text); line-height:1.5;
    }
    .rp-card .rp-title em { font-style:normal; color:var(--gold); }
    @keyframes rpFadeIn { to { opacity:1; transform:translateY(0); } from { opacity:0; transform:translateY(10px); } }
    @media (hover:hover) {
      .rp-card:hover { border-color:var(--gold-dim); border-left-color:var(--gold); transform:translateX(4px); box-shadow:0 4px 20px rgba(0,0,0,0.2); }
    }
    .rp-card:active { transform:scale(0.97); }
    .rp-card .rp-dot {
      width:4px; height:4px; border-radius:50%; background:var(--gold-dim);
      flex-shrink:0; opacity:0.5;
    }
    @media (max-width:480px) {
      .rp-header { padding:.5rem .6rem; }
      .rp-header h1 { font-size:.8rem; }
      .rp-header .back-link { font-size:.65rem; }
      .rp-body { padding:.5rem 1rem 8rem; }
      .rp-narrative { font-size:.75rem; padding:1.2rem 1rem; }
      .rp-grid { gap:.6rem; }
      .rp-card { padding:.8rem 1rem; }
      .rp-card .rp-title { font-size:.8rem; }
    }
  </style>
</head>
<body>
  <header class="rp-header">
    <a href="../index.html" class="back-link">← 처음으로</a>
    <h1>✦ 독서의 힘</h1>
    <span></span>
  </header>

  <div class="stars" id="stars"></div>

  <nav class="mode-nav">
    <a href="../oracle/index.html" class="mode-btn">오라클</a>
    <a href="../tarot/index.html" class="mode-btn">타로</a>
    <a href="../comfort/index.html" class="mode-btn">처방전</a>
    <a href="../capsule/index.html" class="mode-btn">캡슐</a>
    <a href="../wish/index.html" class="mode-btn">별자리</a>
    <a href="../book/index.html" class="mode-btn">서재</a>
    <a href="../reading-power/index.html" class="mode-btn active">독서의힘</a>
    <a href="../radio/index.html" class="mode-btn">라디오</a>
  </nav>

  <div class="rp-body">
    <div class="rp-narrative">
      <em>한 권의 책</em>은 당신이 살아보지 못한<br/>
      또 하나의 인생입니다. 내면을 채우는<br/>
      영혼의 문장들을 만나보세요.
    </div>

    <div class="rp-grid" id="rpGrid"></div>
  </div>

  <div class="footer">그리움이 닿는 곳</div>

  <script>
    const books = [
      { icon: '📖', title: '고양이를 버리다 · 아버지에 대해 이야기할 때' },
      { icon: '📖', title: '끝까지 남겨두는 그 마음' },
      { icon: '📖', title: '거울나라의 앨리스' },
      { icon: '📖', title: '데미안' },
      { icon: '📖', title: '독일인의 사랑' },
      { icon: '📖', title: '빨강 머리 앤' },
      { icon: '📖', title: '사슴' },
      { icon: '📖', title: '야간 비행' },
      { icon: '📖', title: '어린 왕자' },
      { icon: '📖', title: '오만과 편견' },
      { icon: '📖', title: '오셀로' },
      { icon: '📖', title: '오즈의 마법사' },
      { icon: '📖', title: '이상한 나라의 앨리스' },
      { icon: '📖', title: '자기만의 방' },
      { icon: '📖', title: '청춘은 아름다워' },
      { icon: '📖', title: '키다리 아저씨' },
      { icon: '📖', title: '탈무드' }
    ];

    const grid = document.getElementById('rpGrid');
    books.forEach((b, i) => {
      const card = document.createElement('div');
      card.className = 'rp-card';
      card.style.animationDelay = (i * 0.04) + 's';
      card.innerHTML = `<span class="rp-icon">${b.icon}</span><span class="rp-title">${b.title}</span>`;
      grid.appendChild(card);
    });

    // Stars
    (function(){
      const c=document.getElementById('stars');
      for(let i=0;i<40;i++){
        const s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        s.style.setProperty('--d',(Math.random()*4+3)+'s');
        s.style.animationDelay=Math.random()*5+'s'; c.appendChild(s);
      }
    })();
  </script>
</body>
</html>
