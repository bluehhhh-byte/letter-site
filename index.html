<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>그리움이 닿는 곳</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Inter:wght@200;300;400;500&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background:#07070d; color:#e8e4de;
      font-family:'Noto Serif KR',serif;
      min-height:100vh; min-height:-webkit-fill-available;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:2rem; text-align:center; overflow-x:hidden;
    }
    .stars {
      position:fixed; inset:0; pointer-events:none; overflow:hidden;
    }
    .star {
      position:absolute; width:2px; height:2px;
      background:#c9a96e; border-radius:50%;
      animation:twinkle var(--d) ease-in-out infinite; opacity:0;
    }
    @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:0.8} }
    .content { position:relative; z-index:1; max-width:600px; padding:0 1rem; }
    .logo { font-size:2.5rem; margin-bottom:.5rem; opacity:0.6; }
    h1 { font-size:clamp(1.6rem,5vw,2.8rem); font-weight:300; margin-bottom:.8rem; }
    h1 em { font-style:normal; color:#c9a96e; }
    .desc { color:#9e9a94; font-weight:300; font-size:.9rem; line-height:1.8; margin-bottom:2rem; }
    .links { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
    .link-card {
      display:flex; flex-direction:column; align-items:center; gap:.6rem;
      padding:1.5rem 2rem; border:1px solid #1e1e2a;
      text-decoration:none; color:#e8e4de; transition:all .3s;
      background:#12121a; border-radius:4px; min-width:145px; flex:1;
      -webkit-touch-callout:none;
    }
    @media (hover:hover) {
      .link-card:hover { border-color:#c9a96e; transform:translateY(-4px); box-shadow:0 8px 30px rgba(0,0,0,0.3); }
    }
    .link-card:active { transform:scale(0.96); }
    .link-card .icon { font-size:1.8rem; }
    .link-card .label { font-family:'Inter',sans-serif; font-size:.75rem; letter-spacing:.15em; color:#c9a96e; }
    .link-card .sub { font-family:'Inter',sans-serif; font-size:.6rem; color:#6b6765; }
    .footer { position:fixed; bottom:1.5rem; left:0; right:0; font-family:'Inter',sans-serif; font-size:.6rem; color:#5a5655; letter-spacing:.1em; }
    @media (max-width:480px) {
      body { padding:1.5rem 1rem; }
      .link-card { padding:1.2rem 1.2rem; min-width:120px; }
      .link-card .icon { font-size:1.4rem; }
      .link-card .label { font-size:.7rem; }
      .logo { font-size:2rem; }
      .footer { font-size:.5rem; bottom:1rem; }
      .desc { font-size:.8rem; }
    }
    @media (max-width:374px) {
      .links { flex-direction:column; align-items:center; }
      .link-card { width:100%; max-width:220px; }
    }
    @supports (padding:max(0px)) {
      body { padding-left:max(2rem,env(safe-area-inset-left)); padding-right:max(2rem,env(safe-area-inset-right)); padding-bottom:max(2rem,env(safe-area-inset-bottom)); }
      .footer { padding-bottom:max(0px,env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="content">
    <div class="logo">✦</div>
    <h1>그리움이 <em>닿는</em> 곳</h1>
    <p class="desc">당신의 마음이 머무는 공간<br/>하고 싶은 말들을 기록하고, 별과 타로가 답합니다</p>
    <div class="links">
      <a href="oracle/index.html" class="link-card">
        <span class="icon">🔮</span>
        <span class="label">오라클</span>
        <span class="sub">고민될 때</span>
      </a>
      <a href="tarot/index.html" class="link-card">
        <span class="icon">🃏</span>
        <span class="label">타로 리딩</span>
        <span class="sub">더욱 고민될 때</span>
      </a>
      <a href="book/index.html" class="link-card">
        <span class="icon">📖</span>
        <span class="label">마법사의 서재</span>
        <span class="sub">독서의 힘</span>
      </a>
      <a href="radio/index.html" class="link-card">
        <span class="icon">📻</span>
        <span class="label">같은 주파수</span>
        <span class="sub">함께 듣는 음악</span>
      </a>
      <a href="comfort/index.html" class="link-card">
        <span class="icon">🕊</span>
        <span class="label">마음 처방전</span>
        <span class="sub">감정별 위로의 말</span>
      </a>
      <a href="wish/index.html" class="link-card">
        <span class="icon">✨</span>
        <span class="label">소망의 별자리</span>
        <span class="sub">별을 빌다</span>
      </a>
      <a href="capsule/index.html" class="link-card">
        <span class="icon">⏳</span>
        <span class="label">시간 캡슐</span>
        <span class="sub">미래의 나에게</span>
      </a>
    </div>
  </div>
  <div class="footer">그리움이 닿는 곳</div>
  <script>
    (function(){
      const c=document.getElementById('stars');
      for(let i=0;i<60;i++){
        const s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        s.style.setProperty('--d',(Math.random()*4+3)+'s');
        s.style.animationDelay=Math.random()*5+'s'; c.appendChild(s);
      }
    })();
  </script>
</body>
</html>
