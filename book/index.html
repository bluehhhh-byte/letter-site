    body { justify-content: flex-start; padding-top:5rem; }
    .bk-header {
      position:fixed; top:0; left:0; right:0; z-index:50;
      padding:.85rem 2rem;
      background:rgba(7,7,13,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .bk-header .back-link { color:var(--text-dim); text-decoration:none; font-family:var(--font-sans); font-size:.8rem; letter-spacing:.1em; transition:color .3s; }
    @media (hover:hover) { .bk-header .back-link:hover { color:var(--gold); } }
    .bk-header h1 { font-family:var(--font-serif); font-size:1rem; font-weight:300; color:var(--gold); letter-spacing:.15em; }
    .bk-body { position:relative; z-index:1; width:100%; max-width:680px; padding:1rem 1.5rem 8rem; display:flex; flex-direction:column; align-items:center; gap:1.2rem; }

    .bk-narrative {
      font-family:var(--font-serif); font-size:.8rem; line-height:2;
      color:var(--text-dim); text-align:center; font-weight:300;
      padding:1.5rem 1rem; border:1px solid var(--border);
      background:var(--bg-card); max-width:480px;
    }
    .bk-narrative em { font-style:normal; color:var(--gold); }

    .bk-loading {
      font-family:var(--font-sans); font-size:.7rem;
      color:var(--text-muted); letter-spacing:.15em;
      padding:2rem; text-align:center;
    }
    .bk-error {
      font-family:var(--font-sans); font-size:.7rem;
      color:#c97e6e; text-align:center; padding:1rem;
      border:1px solid rgba(201,126,110,0.2);
    }

    .bk-grid {
      display:grid; grid-template-columns:1fr; gap:1rem;
      width:100%; max-width:560px;
    }

    .bk-card {
      display:flex; flex-direction:row; gap:1rem;
      border:1px solid var(--border); background:var(--bg-card);
      padding:1rem; cursor:pointer;
      transition:all .3s; touch-action:manipulation;
      text-decoration:none; color:var(--text); text-align:left;
      animation:bkFadeIn .6s ease forwards; opacity:0;
    }
    .bk-card .bk-rank {
      font-family:var(--font-sans); font-size:.55rem; color:var(--gold-dim);
      min-width:1.5rem; text-align:center; line-height:1.2;
      border-right:1px solid var(--border); padding-right:.6rem;
      margin-right:.6rem; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
    }
    .bk-card .bk-rank-num { font-size:1.1rem; font-weight:400; }
    @keyframes bkFadeIn { to { opacity:1; transform:translateY(0); } from { opacity:0; transform:translateY(12px); } }
    @media (hover:hover) {
      .bk-card:hover { border-color:var(--gold-dim); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.2); }
    }
    .bk-card:active { transform:scale(0.97); }

    .bk-card .bk-cover-wrap {
      flex-shrink:0; width:80px;
    }
    .bk-card .bk-cover {
      width:100%; aspect-ratio:3/4; object-fit:cover;
      border:1px solid rgba(201,169,110,0.12);
      background:var(--bg);
    }
    .bk-card .bk-info { flex:1; min-width:0; }
    .bk-card .bk-title {
      font-family:var(--font-serif); font-size:.85rem;
      font-weight:400; color:var(--gold); margin-bottom:.2rem;
    }
    .bk-card .bk-author {
      font-family:var(--font-sans); font-size:.65rem;
      color:var(--text-dim); margin-bottom:.3rem;
    }
    .bk-card .bk-meta {
      font-family:var(--font-sans); font-size:.55rem;
      color:var(--text-muted); letter-spacing:.05em;
      display:flex; flex-wrap:wrap; gap:.2rem .5rem;
    }
    .bk-card .bk-meta span { color:var(--gold-dim); }
    .bk-card .bk-summary {
      font-family:var(--font-serif); font-size:.75rem;
      line-height:1.85; color:var(--text); font-weight:300;
      margin-top:.4rem; padding-top:.4rem; border-top:1px solid var(--border);
    }
    .bk-card .bk-badge {
      display:inline-block; font-family:var(--font-sans); font-size:.4rem;
      letter-spacing:.1em; color:var(--gold);
      border:1px solid rgba(201,169,110,0.2); padding:.05rem .3rem;
      margin-bottom:.2rem; width:fit-content;
    }

    /* Today's Pick */
    .bk-pick {
      width:100%; max-width:560px;
      display:flex; flex-direction:row; gap:1.2rem;
      border:1px solid rgba(201,169,110,0.25);

    }
    .bk-pick .bk-pick-title {
      font-family:var(--font-serif); font-size:.95rem;
      font-weight:400; color:var(--gold); margin-bottom:.2rem;
    }
    .bk-pick .bk-pick-author {
      font-family:var(--font-sans); font-size:.65rem;
      color:var(--text-dim); margin-bottom:.3rem;
    }
    .bk-pick .bk-pick-meta {
      font-family:var(--font-sans); font-size:.6rem;
      color:var(--text-muted); margin-bottom:.4rem;
      display:flex; flex-wrap:wrap; gap:.2rem .5rem;
    }
    .bk-pick .bk-pick-meta span { color:var(--gold-dim); }
    .bk-pick .bk-pick-desc {
      font-family:var(--font-serif); font-size:.75rem;
      color:var(--text); line-height:1.9; font-weight:300;
      padding-top:.4rem; border-top:1px solid var(--border);
    }

    .bk-retry {
      margin-top:.5rem; padding:.5rem 1.2rem;
      border:1px solid var(--border); background:var(--bg-card);
      color:var(--text-dim); font-family:var(--font-sans);
      font-size:.65rem; cursor:pointer; border-radius:4px;
      transition:all .3s; touch-action:manipulation;
    }
    .bk-retry:hover { border-color:var(--gold-dim); color:var(--gold); }

    .bk-genre-filter {
      width:100%; max-width:560px;
      display:flex; flex-wrap:wrap; gap:.35rem;
      justify-content:center; padding:.5rem 0;
    }
    .bk-genre-btn {
      font-family:var(--font-sans); font-size:.6rem;
      letter-spacing:.08em; padding:.3rem .7rem;
      border:1px solid var(--border); background:var(--bg-card);
      color:var(--text-dim); cursor:pointer; transition:all .3s;
      touch-action:manipulation; border-radius:3px;
    }
    .bk-genre-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
    .bk-genre-btn.active { background:rgba(201,169,110,0.12); border-color:var(--gold-dim); color:var(--gold); }

    @media (max-width:480px) {
      body { padding-top:4rem; }
      .bk-body { padding:.5rem 1rem 8rem; gap:1rem; }
      .bk-card { padding:.8rem; gap:.8rem; }

      .bk-card .bk-summary { font-size:.65rem; }
      .bk-card .bk-meta { font-size:.5rem; }
      .bk-narrative { font-size:.75rem; padding:1rem .8rem; }
      .bk-pick { padding:.8rem; gap:.8rem; }
      .bk-pick .bk-pick-cover-wrap { width:80px; }

      if (!book.genre) return '기타';
      if (book.genre.indexOf('>') > 0) {
        var parts = book.genre.split('>');

      }
      return book.genre;
    }

        var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
      return arr;

      { title:'오셀로', author:'윌리엄 셰익스피어', search:'오셀로 셰익스피어', nationality:'영국', genre:'희곡', year:'', publisher:'', salesPoint:0, coverImg:'', summary:'질투와 의심이 빚어낸 비극적 사랑 이야기.', isChoice:false },
      { title:'오즈의 마법사', author:'라이먼 프랭크 바움', search:'오즈의 마법사 라이먼 프랭크 바움', nationality:'미국', genre:'소설', year:'', publisher:'', salesPoint:0, coverImg:'', summary:'용기와 지혜를 찾아 오즈로 떠나는 모험.', isChoice:false },
      { title:'이상한 나라의 앨리스', author:'루이스 캐럴', search:'이상한 나라의 앨리스 루이스 캐럴', nationality:'영국', genre:'소설', year:'', publisher:'', salesPoint:0, coverImg:'', summary:'토끼굴로 떠난 앨리스의 기묘하고 환상적인 모험.', isChoice:false },
      { title:'자기만의 방', author:'버지니아 울프', search:'자기만의 방 버지니아 울프', nationality:'영국', genre:'에세이', year:'', publisher:'', salesPoint:0, coverImg:'', summary:'여성이 글을 쓰기 위해 필요한 조건에 대한 에세이.', isChoice:false },
      { title:'청춘은 아름다워', author:'헤르만 헤세', search:'청춘은 아름다워 헤르만 헤세', nationality:'독일', genre:'소설', year:'', publisher:'', salesPoint:0, coverImg:'', summary:'청춘의 방황과 성장을 그린 헤세의 아름다운 이야기.', isChoice:false },
      { title:'키다리 아저씨', author:'진 웹스터', search:'키다리 아저씨 진 웹스터', nationality:'미국', genre:'소설', year:'', publisher:'', salesPoint:0, coverImg:'', summary:'고아 소녀 주디가 익명의 후원자에게 보내는 편지 형식의 성장 소설.', isChoice:false },
      { title:'탈무드', author:'유대인 현자들', search:'탈무드', nationality:'유대', genre:'인문', year:'', publisher:'', salesPoint:0, coverImg:'', summary:'유대인들의 지혜와 교훈이 담긴 고전.', isChoice:false }
    ];

    function aladinUrl(book) {
      return 'https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&SearchWord=' + encodeURIComponent(book.search);
    }

    function googleAiUrl(book) {
      var q = book.title + ' ' + book.author + ' 설명해줘';
      return 'https://www.google.com/search?q=' + encodeURIComponent(q) + '&udm=50';
    }

    function renderGenreFilter() {
      var genreSet = {};
      allBooks.forEach(function(b) { genreSet[extractGenre(b)] = true; });
      var genres = Object.keys(genreSet).sort();
      var html = '<div class="bk-genre-filter" id="bkGenreFilter">' +
        '<button class="bk-genre-btn' + (currentGenre === '전체' ? ' active' : '') + '" data-genre="전체">전체</button>';
      genres.forEach(function(g) {
        html += '<button class="bk-genre-btn' + (currentGenre === g ? ' active' : '') + '" data-genre="' + g + '">' + g + '</button>';
      });
      html += '<button class="bk-genre-btn' + (currentGenre === '퐁퐁추천' ? ' active' : '') + '" data-genre="퐁퐁추천">✨ 퐁퐁추천</button>';
      html += '</div>';
      var existing = document.getElementById('bkGenreFilter');
      if (existing) existing.remove();
      body.insertAdjacentHTML('beforeend', html);
      document.getElementById('bkGenreFilter').addEventListener('click', function(e) {
        if (e.target.classList.contains('bk-genre-btn')) {
          filterByGenre(e.target.getAttribute('data-genre'));
        }
      });
    }

    var _savedNarrative = '';

    function filterByGenre(genre) {
      currentGenre = genre;
      var existingGrid = document.getElementById('bkGrid');
      if (existingGrid) existingGrid.remove();
      var existingPick = body.querySelector('.bk-pick');
      if (existingPick) existingPick.remove();
      var existingNarrative = body.querySelector('.bk-narrative');
      if (existingNarrative) { _savedNarrative = existingNarrative.innerHTML; existingNarrative.remove(); }
      var btns = document.querySelectorAll('.bk-genre-btn');
      btns.forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-genre') === genre); });
      if (genre === '퐁퐁추천') {
        allBooks = PONGPONG_BOOKS.map(function(b) {
          var book = JSON.parse(JSON.stringify(b));
          book.detailUrl = googleAiUrl(book);
          return book;
        });
        shuffleArray(allBooks);
        body.insertAdjacentHTML('beforeend',
          '<div class="bk-narrative"><em>퐁퐁추천</em> · 내면을 채우는 영혼의 문장들</div>');
        renderGrid();
      } else {
        if (_originalBooks.length) allBooks = _originalBooks.slice();
        if (_savedNarrative) body.insertAdjacentHTML('beforeend', '<div class="bk-narrative">' + _savedNarrative + '</div>');
        renderGrid();
      }
    }

    function bkCardHtml(b) {
      var rankBadge = b.rank ? '<div class="bk-rank"><span class="bk-rank-num">' + b.rank + '</span>위</div>' : '';
      return rankBadge +
        (b.coverImg ? '<div class="bk-cover-wrap"><img class="bk-cover" src="' + proxyCover(b.coverImg) + '" alt="' + b.title + '" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.style.display=\'none\'" /></div>' : '') +
        '<div class="bk-info">' +
        '<div class="bk-title">' + b.title + '</div>' +
        '<div class="bk-author">' + b.author + '</div>' +
        '<div class="bk-meta">' +
        (b.nationality ? '<span>국적</span> ' + b.nationality + ' · ' : '') +
        '<span>장르</span> ' + extractGenre(b) +
        ' · <span>발행</span> ' + b.year +
        ' · <span>출판</span> ' + b.publisher +
        '</div>' +
        '<div class="bk-summary">' + b.summary + '</div>' +
        '</div>';
    }

    function renderGrid() {
      var filtered = currentGenre === '전체' || currentGenre === '퐁퐁추천' ? allBooks.slice() : allBooks.filter(function(b) { return extractGenre(b) === currentGenre; });
      if (filtered.length === 0) {
        body.insertAdjacentHTML('beforeend', '<div class="bk-error">이 분야의 책이 아직 없습니다</div>');
        return;
      }
      body.insertAdjacentHTML('beforeend', '<div class="bk-grid" id="bkGrid"></div>');
      var grid = document.getElementById('bkGrid');
      filtered.forEach(function(b) {
        var card = document.createElement(b.detailUrl ? 'a' : 'div');
        card.className = 'bk-card';
        if (b.detailUrl) { card.href = b.detailUrl; card.target = '_blank'; card.rel = 'noopener'; }
        card.style.animationDelay = (Math.random() * 0.6) + 's';
        card.innerHTML = bkCardHtml(b);
        grid.appendChild(card);
      });
    }

    function renderBooks(data) {
      loading.style.display = 'none';
      if (!data.books || data.books.length === 0) {
        body.insertAdjacentHTML('beforeend', '<div class="bk-error">아직 책이 도착하지 않았습니다</div>');
        return;
      }
      allBooks = data.books.map(function(b, i) { b.rank = b.rank || (i + 1); return b; });
      _originalBooks = allBooks.slice();
      currentGenre = '전체';

      body.insertAdjacentHTML('beforeend',
        '<div class="bk-narrative">' + NARRATIVES[narrativeIdx] + '</div>');
      renderGenreFilter();
      renderGrid();
    }

    function fetchBooks() {
      loading.textContent = '별빛 아래 책을 꺼내는 중...';
      loading.style.display = '';

      var existing = body.querySelectorAll('.bk-narrative, .bk-pick, .bk-grid, .bk-error, .bk-retry, .bk-genre-filter');
      existing.forEach(function(el) { if (el.id !== 'bkLoading') el.remove(); });

      var apiUrl;
      if (location.protocol === 'file:') {
        var params = new URLSearchParams({
          ttbkey: 'ttbbluehhhh1424001',
          QueryType: 'BlogBest',
          MaxResults: '50',
          start: '1',
          SearchTarget: 'Book',
          output: 'js',
          Version: '20131101'
        });
        apiUrl = ALADIN_API + '?' + params;
      } else {
        apiUrl = '/api/books';
      }

      fetch(apiUrl)
        .then(function(r) {
          if (!r.ok) throw new Error('서버 응답 오류');
          return r.json();
        })
        .then(function(data) {
          if (data.item) {
            renderBooks({ books: data.item.map(function(item, i) {
              return {
                rank: i + 1,
                title: item.title || '',
                author: item.author || '',
                publisher: item.publisher || '',
                year: item.pubDate ? item.pubDate.substring(0, 4) : '',
                genre: item.categoryName || '',
                summary: item.description || '',
                coverImg: item.cover || '',
                detailUrl: item.link || '',
                salesPoint: item.salesPoint || 0
              };
            })});
          } else if (data.books) {
            renderBooks(data);
          } else {
            throw new Error('데이터 형식 오류');
          }
        })
        .catch(function() {
          if (location.protocol === 'file:') {
            renderBooks({ books: sortBySalesPoint(MOCK_BOOKS) });
          } else {
            loading.style.display = 'none';
            body.insertAdjacentHTML('beforeend',
              '<div class="bk-error">책을 가져오지 못했습니다<br/>잠시 후 다시 시도해 주세요</div>' +
              '<button class="bk-retry" onclick="fetchBooks()">다시 시도</button>');
          }
        });
    }

    // Stars
    (function(){
      var c=document.getElementById('stars');
      for(var i=0;i<50;i++){
        var s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        s.style.setProperty('--d',(Math.random()*4+3)+'s');
        s.style.animationDelay=Math.random()*5+'s'; c.appendChild(s);
      }
    })();

    fetchBooks();
  </script>
</body>
</html>
