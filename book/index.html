<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>마법사의 서재 — 그리움이 닿는 곳</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { justify-content: flex-start; padding-top:5rem; }
    .bk-header {
      position:fixed; top:0; left:0; right:0; z-index:50;
      padding:.85rem 2rem;
      background:rgba(7,7,13,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .bk-header .back-link { color:var(--text-dim); text-decoration:none; font-family:var(--font-sans); font-size:.8rem; letter-spacing:.1em; transition:color .3s; }
    @media (hover:hover) { .bk-header .back-link:hover { color:var(--gold); } }
    .bk-header h1 { font-family:var(--font-serif); font-size:1rem; font-weight:300; color:var(--gold); letter-spacing:.15em; }
    .bk-body { position:relative; z-index:1; width:100%; max-width:680px; padding:1rem 1.5rem 8rem; display:flex; flex-direction:column; align-items:center; gap:1.2rem; }

    .bk-narrative {
      font-family:var(--font-serif); font-size:.8rem; line-height:2;
      color:var(--text-dim); text-align:center; font-weight:300;
      padding:1.5rem 1rem; border:1px solid var(--border);
      background:var(--bg-card); max-width:480px;
    }
    .bk-narrative em { font-style:normal; color:var(--gold); }

    .bk-loading {
      font-family:var(--font-sans); font-size:.7rem;
      color:var(--text-muted); letter-spacing:.15em;
      padding:2rem; text-align:center;
    }
    .bk-error {
      font-family:var(--font-sans); font-size:.7rem;
      color:#c97e6e; text-align:center; padding:1rem;
      border:1px solid rgba(201,126,110,0.2);
    }

    .bk-grid {
      display:grid; grid-template-columns:1fr; gap:1rem;
      width:100%; max-width:560px;
    }

    .bk-card {
      display:flex; flex-direction:row; gap:1rem;
      border:1px solid var(--border); background:var(--bg-card);
      padding:1rem; cursor:pointer;
      transition:all .3s; touch-action:manipulation;
      text-decoration:none; color:var(--text); text-align:left;
      animation:bkFadeIn .6s ease forwards; opacity:0;
    }
    .bk-card:nth-child(1) { animation-delay:.05s; }
    .bk-card:nth-child(2) { animation-delay:.1s; }
    .bk-card:nth-child(3) { animation-delay:.15s; }
    .bk-card:nth-child(4) { animation-delay:.2s; }
    .bk-card:nth-child(5) { animation-delay:.25s; }
    .bk-card:nth-child(6) { animation-delay:.3s; }
    .bk-card:nth-child(7) { animation-delay:.35s; }
    .bk-card:nth-child(8) { animation-delay:.4s; }
    @keyframes bkFadeIn { to { opacity:1; transform:translateY(0); } from { opacity:0; transform:translateY(12px); } }
    @media (hover:hover) {
      .bk-card:hover { border-color:var(--gold-dim); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.2); }
    }
    .bk-card:active { transform:scale(0.97); }

    .bk-card .bk-cover-wrap {
      flex-shrink:0; width:80px;
    }
    .bk-card .bk-cover {
      width:100%; aspect-ratio:3/4; object-fit:cover;
      border:1px solid rgba(201,169,110,0.12);
      background:var(--bg);
    }
    .bk-card .bk-info { flex:1; min-width:0; }
    .bk-card .bk-title {
      font-family:var(--font-serif); font-size:.85rem;
      font-weight:400; color:var(--gold); margin-bottom:.2rem;
    }
    .bk-card .bk-author {
      font-family:var(--font-sans); font-size:.65rem;
      color:var(--text-dim); margin-bottom:.3rem;
    }
    .bk-card .bk-meta {
      font-family:var(--font-sans); font-size:.55rem;
      color:var(--text-muted); letter-spacing:.05em;
      display:flex; flex-wrap:wrap; gap:.2rem .5rem;
    }
    .bk-card .bk-meta span { color:var(--gold-dim); }
    .bk-card .bk-summary {
      font-family:var(--font-serif); font-size:.7rem;
      line-height:1.6; color:var(--text); font-weight:300;
      margin-top:.4rem; padding-top:.4rem; border-top:1px solid var(--border);
    }
    .bk-card .bk-badge {
      display:inline-block; font-family:var(--font-sans); font-size:.4rem;
      letter-spacing:.1em; color:var(--gold);
      border:1px solid rgba(201,169,110,0.2); padding:.05rem .3rem;
      margin-bottom:.2rem; width:fit-content;
    }

    /* Today's Pick */
    .bk-pick {
      width:100%; max-width:560px;
      display:flex; flex-direction:row; gap:1.2rem;
      border:1px solid rgba(201,169,110,0.25);
      background:rgba(201,169,110,0.03); padding:1.2rem;
      cursor:pointer; text-decoration:none;
      color:var(--text); transition:all .3s; text-align:left;
      animation:bkFadeIn .6s ease forwards; opacity:0;
    }
    .bk-pick .bk-pick-cover-wrap {
      flex-shrink:0; width:100px;
    }
    .bk-pick .bk-pick-cover {
      width:100%; aspect-ratio:3/4; object-fit:cover;
      border:1px solid rgba(201,169,110,0.15);
      background:var(--bg);
    }
    .bk-pick .bk-pick-info { flex:1; min-width:0; }
    .bk-pick .bk-pick-label {
      font-family:var(--font-sans); font-size:.5rem;
      letter-spacing:.2em; color:var(--gold); margin-bottom:.4rem;
    }
    .bk-pick .bk-pick-title {
      font-family:var(--font-serif); font-size:.95rem;
      font-weight:400; color:var(--gold); margin-bottom:.2rem;
    }
    .bk-pick .bk-pick-author {
      font-family:var(--font-sans); font-size:.65rem;
      color:var(--text-dim); margin-bottom:.3rem;
    }
    .bk-pick .bk-pick-meta {
      font-family:var(--font-sans); font-size:.6rem;
      color:var(--text-muted); margin-bottom:.4rem;
      display:flex; flex-wrap:wrap; gap:.2rem .5rem;
    }
    .bk-pick .bk-pick-meta span { color:var(--gold-dim); }
    .bk-pick .bk-pick-desc {
      font-family:var(--font-serif); font-size:.75rem;
      color:var(--text); line-height:1.7; font-weight:300;
      padding-top:.4rem; border-top:1px solid var(--border);
    }

    .bk-retry {
      margin-top:.5rem; padding:.5rem 1.2rem;
      border:1px solid var(--border); background:var(--bg-card);
      color:var(--text-dim); font-family:var(--font-sans);
      font-size:.65rem; cursor:pointer; border-radius:4px;
      transition:all .3s; touch-action:manipulation;
    }
    .bk-retry:hover { border-color:var(--gold-dim); color:var(--gold); }

    .bk-genre-filter {
      width:100%; max-width:560px;
      display:flex; flex-wrap:wrap; gap:.35rem;
      justify-content:center; padding:.5rem 0;
    }
    .bk-genre-btn {
      font-family:var(--font-sans); font-size:.6rem;
      letter-spacing:.08em; padding:.3rem .7rem;
      border:1px solid var(--border); background:var(--bg-card);
      color:var(--text-dim); cursor:pointer; transition:all .3s;
      touch-action:manipulation; border-radius:3px;
    }
    .bk-genre-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
    .bk-genre-btn.active { background:rgba(201,169,110,0.12); border-color:var(--gold-dim); color:var(--gold); }

    @media (max-width:480px) {
      body { padding-top:4rem; }
      .bk-body { padding:.5rem 1rem 8rem; gap:1rem; }
      .bk-card { padding:.8rem; gap:.8rem; }
      .bk-card .bk-cover-wrap { width:60px; }
      .bk-card .bk-title { font-size:.78rem; }
      .bk-card .bk-summary { font-size:.65rem; }
      .bk-card .bk-meta { font-size:.5rem; }
      .bk-narrative { font-size:.75rem; padding:1rem .8rem; }
      .bk-pick { padding:.8rem; gap:.8rem; }
      .bk-pick .bk-pick-cover-wrap { width:80px; }
      .bk-pick .bk-pick-desc { font-size:.68rem; }
    }
  </style>
</head>

  <script>
    var NARRATIVES = [
      '당신이 이 책을 읽으며 따뜻한 밤을 보내길 바라는 마음으로<br/>마법사의 서재에서 <em>신간</em>을 꺼내왔습니다',
      '지금 내 곁엔 없지만,<br/>이 페이지 너머로 전하는 <em>문장</em>이 당신에게 닿기를',
      '마법사가 엮은 오늘의 <em>추천</em>입니다<br/>당신의 책꽂이에 새 이야기가 찾아갑니다'
    ];

    var body = document.getElementById('bkBody');
    var loading = document.getElementById('bkLoading');
    var narrativeIdx = Math.floor(Math.random() * NARRATIVES.length);

    function proxyCover(url) {
      if (!url) return '';
      if (location.protocol === 'file:') return 'https://corsproxy.io/?' + encodeURIComponent(url);
      return '/api/cover?url=' + encodeURIComponent(url);
    }

    var ALADIN_API = 'https://www.aladin.co.kr/ttb/api/ItemList.aspx';

    var MOCK_BOOKS = [
      { title:'아몬드', author:'손원평', nationality:'한국', genre:'소설', year:'2017', publisher:'창비', salesPoint:73950,
        coverImg:'https://image.aladin.co.kr/product/16958/43/cover/8936434121_1.jpg',

      { title:'달러구트 꿈 백화점', author:'이미예', nationality:'한국', genre:'판타지', year:'2020', publisher:'팩토리나인', salesPoint:71270,
        coverImg:'https://image.aladin.co.kr/product/25317/21/cover/1161910345_1.jpg',
        summary:'꿈을 사고파는 신비한 백화점, 달러구트.',

      { title:'모순', author:'양귀자', nationality:'한국', genre:'소설', year:'1998', publisher:'쓰다', salesPoint:34935,
        coverImg:'https://image.aladin.co.kr/product/27/12/cover/8998441011_1.jpg',
        summary:'인생의 모순과 그 안에서 피어나는 인간의 의지를 그린 작품.',
        detailUrl:'https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&SearchWord=%EB%AA%A8%EC%88%9C+%EC%96%91%EA%B7%80%EC%9E%90', isChoice:false },
      { title:'오늘 밤, 세계에서 이 사랑이 사라진다 해도', author:'이치조 미사키', nationality:'일본', genre:'로맨스', year:'2022', publisher:'모모', salesPoint:23720,
        coverImg:'https://image.aladin.co.kr/product/29879/1/cover/1161910345_2.jpg',
        summary:'기억을 잃어가는 소년과 그를 사랑하는 소녀의 아픈 로맨스.',
        detailUrl:'https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&SearchWord=%EC%98%A4%EB%8A%98+%EB%B0%A4+%EC%84%B8%EA%B3%84%EC%97%90%EC%84%9C+%EC%9D%B4+%EC%82%AC%EB%9E%91%EC%9D%B4+%EC%82%AC%EB%9D%BC%EC%A7%84%EB%8B%A4+%ED%95%B4%EB%8F%84', isChoice:false },
      { title:'세상에서 가장 예쁜 딸에게', author:'전영신', nationality:'한국', genre:'에세이', year:'2021', publisher:'arte', salesPoint:27030,
        coverImg:'https://image.aladin.co.kr/product/30147/7/cover/1161910345_3.jpg',
        summary:'딸에게 전하는 엄마의 따뜻한 편지글.',
        detailUrl:'https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&SearchWord=%EC%84%B8%EC%83%81%EC%97%90%EC%84%9C+%EA%B0%80%EC%9E%A5+%EC%98%88%EC%81%9C+%EB%94%B8%EC%97%90%EA%B2%8C', isChoice:false },
      { title:'나는 나를 돌봅니다', author:'에이미 B. 셔버', nationality:'미국', genre:'자기계발', year:'2022', publisher:'갤리온', salesPoint:16860,
        coverImg:'https://image.aladin.co.kr/product/31503/2/cover/1161910345_4.jpg',
        summary:'스스로를 돌보는 용기에 관한 이야기.',
        detailUrl:'https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&SearchWord=%EB%82%98%EB%8A%94+%EB%82%98%EB%A5%BC+%EB%8F%8C%EB%B4%85%EB%8B%88%EB%8B%A4', isChoice:false },
      { title:'아직 오지 않은 날들을 위하여', author:'류시화', nationality:'한국', genre:'시/에세이', year:'2022', publisher:'페이지2', salesPoint:12300,
        coverImg:'https://image.aladin.co.kr/product/32201/0/cover/1161910345_5.jpg',
        summary:'시인이 전하는 내일을 위한 위로의 문장들.',
        detailUrl:'https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&SearchWord=%EC%95%84%EC%A7%81+%EC%98%A4%EC%A7%80+%EC%95%8A%EC%9D%80+%EB%82%A0%EB%93%A4%EC%9D%84+%EC%9C%84%ED%95%98%EC%97%AC', isChoice:false },
      { title:'잘 살아라, 그게 최고의 복수다', author:'김호연', nationality:'한국', genre:'에세이', year:'2023', publisher:'다산북스', salesPoint:24690,
        coverImg:'https://image.aladin.co.kr/product/33005/0/cover/1161910345_6.jpg',
        summary:'인생의 상처와 아픔을 딛고 잘 살아내는 것이 진정한 복수라는 메시지.',
        detailUrl:'https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&SearchWord=%EC%9E%98+%EC%82%B4%EC%95%84%EB%9D%BC+%EA%B7%B8%EA%B2%8C+%EC%B5%9C%EA%B3%A0%EC%9D%98+%EB%B3%B5%EC%88%98%EB%8B%A4', isChoice:false }
    ];

    function sortBySalesPoint(arr) {
      return arr.sort(function(a, b) { return (b.salesPoint || 0) - (a.salesPoint || 0); });
    }

    function extractGenre(book) {
      if (!book.genre) return '기타';
      if (book.genre.indexOf('>') > 0) {
        var parts = book.genre.split('>');
        return parts.length > 1 ? parts[1].trim() : parts[0].trim();
      }
      return book.genre;
    }

    function shuffleArray(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
      return arr;
    }

    var allBooks = [];
    var currentGenre = '전체';

    function renderGenreFilter() {
      var genreSet = {};
      allBooks.forEach(function(b) { genreSet[extractGenre(b)] = true; });
      var genres = Object.keys(genreSet).sort();
      var html = '<div class="bk-genre-filter" id="bkGenreFilter">' +
        '<button class="bk-genre-btn' + (currentGenre === '전체' ? ' active' : '') + '" data-genre="전체">전체</button>';
      genres.forEach(function(g) {
        html += '<button class="bk-genre-btn' + (currentGenre === g ? ' active' : '') + '" data-genre="' + g + '">' + g + '</button>';
      });
      html += '</div>';
      var existing = document.getElementById('bkGenreFilter');
      if (existing) existing.remove();
      body.insertAdjacentHTML('beforeend', html);
      document.getElementById('bkGenreFilter').addEventListener('click', function(e) {
        if (e.target.classList.contains('bk-genre-btn')) {
          filterByGenre(e.target.getAttribute('data-genre'));
        }
      });
    }

    function filterByGenre(genre) {
      currentGenre = genre;
      var existingGrid = document.getElementById('bkGrid');
      if (existingGrid) existingGrid.remove();
      var existingPick = body.querySelector('.bk-pick');
      if (existingPick) existingPick.remove();
      var btns = document.querySelectorAll('.bk-genre-btn');
      btns.forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-genre') === genre); });
      renderGrid();
    }

    function bkCardHtml(b) {
      var badge = b.isChoice ? '<div class="bk-badge">Choice</div>' : '';
      return badge +
        (b.coverImg ? '<div class="bk-cover-wrap"><img class="bk-cover" src="' + proxyCover(b.coverImg) + '" alt="' + b.title + '" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.style.display=\'none\'" /></div>' : '') +
        '<div class="bk-info">' +
        '<div class="bk-title">' + b.title + '</div>' +
        '<div class="bk-author">' + b.author + '</div>' +
        '<div class="bk-meta">' +
        (b.nationality ? '<span>국적</span> ' + b.nationality + ' · ' : '') +
        '<span>장르</span> ' + extractGenre(b) +
        ' · <span>발행</span> ' + b.year +
        ' · <span>출판</span> ' + b.publisher +
        '</div>' +
        '<div class="bk-summary">' + b.summary + '</div>' +
        '</div>';
    }

    function renderGrid() {
      var filtered = currentGenre === '전체' ? allBooks.slice() : allBooks.filter(function(b) { return extractGenre(b) === currentGenre; });
      if (filtered.length === 0) {
        body.insertAdjacentHTML('beforeend', '<div class="bk-error">이 분야의 책이 아직 없습니다</div>');
        return;
      }
      var shuffled = shuffleArray([].concat(filtered));
      var pick = shuffled[0];
      var pickHtml =
        '<a href="' + pick.detailUrl + '" target="_blank" rel="noopener" class="bk-pick">' +
        (pick.coverImg ? '  <div class="bk-pick-cover-wrap"><img class="bk-pick-cover" src="' + proxyCover(pick.coverImg) + '" alt="' + pick.title + '" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.style.display=\'none\'" /></div>' : '') +
        '  <div class="bk-pick-info">' +
        '    <div class="bk-pick-label">✦ 오늘의 선택</div>' +
        '    <div class="bk-pick-title">' + pick.title + '</div>' +
        '    <div class="bk-pick-author">' + pick.author + '</div>' +
        '    <div class="bk-pick-meta">' +
        (pick.nationality ? '      <span>국적</span> ' + pick.nationality + ' · ' : '') +
        '      <span>장르</span> ' + extractGenre(pick) +
        '      · <span>발행</span> ' + pick.year +
        '      · <span>출판</span> ' + pick.publisher +
        '    </div>' +
        '    <div class="bk-pick-desc">' + pick.summary + '</div>' +
        '  </div>' +
        '</a>';
      body.insertAdjacentHTML('beforeend', pickHtml);

      body.insertAdjacentHTML('beforeend', '<div class="bk-grid" id="bkGrid"></div>');
      var grid = document.getElementById('bkGrid');
      var remaining = filtered.slice(1, 9);
      remaining.forEach(function(b) {
        var card = document.createElement('a');
        card.className = 'bk-card';
        card.href = b.detailUrl;
        card.target = '_blank';
        card.rel = 'noopener';
        card.innerHTML = bkCardHtml(b);
        grid.appendChild(card);
      });
    }

    function renderBooks(data) {
      loading.style.display = 'none';
      if (!data.books || data.books.length === 0) {
        body.insertAdjacentHTML('beforeend', '<div class="bk-error">아직 책이 도착하지 않았습니다</div>');
        return;
      }
      allBooks = data.books;
      currentGenre = '전체';

      body.insertAdjacentHTML('beforeend',
        '<div class="bk-narrative">' + NARRATIVES[narrativeIdx] + '</div>');
      renderGenreFilter();
      renderGrid();
    }

    function fetchBooks() {
      loading.textContent = '별빛 아래 책을 꺼내는 중...';
      loading.style.display = '';

      var existing = body.querySelectorAll('.bk-narrative, .bk-pick, .bk-grid, .bk-error, .bk-retry, .bk-genre-filter');
      existing.forEach(function(el) { if (el.id !== 'bkLoading') el.remove(); });

      var apiUrl;
      if (location.protocol === 'file:') {
        var params = new URLSearchParams({
          ttbkey: 'ttbbluehhhh1424001',
          QueryType: 'ItemNewSpecial',
          MaxResults: '20',
          start: '1',
          SearchTarget: 'Book',
          output: 'js',
          Version: '20131101'
        });
        apiUrl = ALADIN_API + '?' + params;
      } else {
        apiUrl = '/api/books';
      }

      fetch(apiUrl)
        .then(function(r) {
          if (!r.ok) throw new Error('서버 응답 오류');
          return r.json();
        })
        .then(function(data) {
          if (data.item) {
            data.item.sort(function(a, b) { return (b.salesPoint || 0) - (a.salesPoint || 0); });
            renderBooks({ books: data.item.map(function(item, i) {
              return {
                title: item.title || '',
                author: item.author || '',
                publisher: item.publisher || '',
                year: item.pubDate ? item.pubDate.substring(0, 4) : '',
                genre: item.categoryName || '',
                summary: item.description || '',
                coverImg: item.cover || '',
                detailUrl: item.link || '',
                salesPoint: item.salesPoint || 0,
                isChoice: i === 0
              };
            })});
          } else if (data.books) {
            renderBooks(data);
          } else {
            throw new Error('데이터 형식 오류');
          }
        })
        .catch(function() {
          if (location.protocol === 'file:') {
            renderBooks({ books: sortBySalesPoint(MOCK_BOOKS) });
          } else {
            loading.style.display = 'none';
            body.insertAdjacentHTML('beforeend',
              '<div class="bk-error">책을 가져오지 못했습니다<br/>잠시 후 다시 시도해 주세요</div>' +
              '<button class="bk-retry" onclick="fetchBooks()">다시 시도</button>');
          }
        });
    }

    // Stars
    (function(){
      var c=document.getElementById('stars');
      for(var i=0;i<50;i++){
        var s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        s.style.setProperty('--d',(Math.random()*4+3)+'s');
        s.style.animationDelay=Math.random()*5+'s'; c.appendChild(s);
      }
    })();

    fetchBooks();
  </script>
</body>
</html>
